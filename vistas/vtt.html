<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTT | Crónicas del Cazador</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root {
      --rojo:#c0392b; --rojo-g:rgba(192,57,43,0.3);
      --dorado:#c9a84c; --dorado-g:rgba(201,168,76,0.25);
      --negro:#0a0a0c; --sup:#111117; --sup2:#16161e; --sup3:#1e1e28;
      --borde:rgba(255,255,255,0.07); --borde-r:rgba(192,57,43,0.35); --borde-d:rgba(201,168,76,0.3);
      --texto:#e8e2d9; --muted:#8a8490; --sec:#b0aab8;
      --verde:#2ecc71; --amarillo:#f39c12; --naranja:#e67e22;
      --chat-w:300px; --bar-h:60px; --nav-h:52px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Raleway',sans-serif;background:var(--negro);color:var(--texto);display:flex;flex-direction:column;}

    /* ══ NAVBAR ══ */
    .navbar{height:var(--nav-h);flex-shrink:0;background:rgba(10,10,12,0.98);border-bottom:1px solid var(--borde);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:50;}
    .nav-logo img{height:28px;filter:invert(1) brightness(0.8);mix-blend-mode:screen;}
    .nav-campana{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--texto);margin-right:auto;}
    .nav-campana span{color:var(--dorado);}
    .avatares-online{display:flex;gap:6px;align-items:center;}
    .avatar-pill{position:relative;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
    .avatar-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:12px;font-weight:700;border:2px solid;flex-shrink:0;transition:transform 0.15s;}
    .avatar-circle:hover{transform:scale(1.1);}
    .avatar-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--sup2);border:1px solid var(--borde-d);padding:6px 10px;white-space:nowrap;font-size:11px;opacity:0;pointer-events:none;transition:opacity 0.2s;z-index:100;}
    .avatar-pill:hover .avatar-tooltip{opacity:1;}
    .avatar-nombre{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:0.05em;max-width:36px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .avatar-penalty{position:absolute;top:-4px;right:-4px;background:var(--rojo);color:white;font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--negro);}
    .est-sano{border-color:var(--verde);color:var(--verde);}
    .est-herido{border-color:var(--amarillo);color:var(--amarillo);}
    .est-grave{border-color:var(--naranja);color:var(--naranja);}
    .est-critico{border-color:var(--rojo);color:var(--rojo);}
    .est-ko{border-color:var(--muted);color:var(--muted);}
    .nav-btn{display:flex;align-items:center;gap:6px;padding:0 12px;height:32px;background:transparent;border:1px solid var(--borde);color:var(--muted);font-family:'Raleway',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:border-color 0.2s,color 0.2s;}
    .nav-btn:hover{border-color:var(--borde-r);color:var(--texto);}
    .nav-btn.dj{border-color:var(--borde-d);color:var(--dorado);}
    .nav-btn.dj:hover{background:rgba(201,168,76,0.08);}

    /* ══ MAIN ══ */
    .main{flex:1;display:flex;overflow:hidden;height:calc(100vh - var(--nav-h) - var(--bar-h));}

    /* ══ CHAT ══ */
    .chat-panel{width:var(--chat-w);flex-shrink:0;background:var(--sup);border-right:1px solid var(--borde);display:flex;flex-direction:column;}
    .chat-header{padding:10px 14px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .chat-header-titulo{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--texto);}
    .chat-mensajes{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;}
    .chat-mensajes::-webkit-scrollbar{width:3px;}
    .chat-mensajes::-webkit-scrollbar-thumb{background:var(--borde-r);}
    .msg{display:flex;flex-direction:column;gap:2px;max-width:100%;}
    .msg-header{display:flex;align-items:center;gap:6px;}
    .msg-autor{font-size:10px;font-weight:700;letter-spacing:0.05em;color:var(--dorado);}
    .msg-hora{font-size:9px;color:var(--muted);}
    .msg-body{font-size:12px;line-height:1.5;color:var(--sec);background:var(--sup2);border:1px solid var(--borde);padding:7px 10px;border-left:2px solid transparent;}
    .msg-body.general{border-left-color:var(--borde);}
    .msg-body.privado{border-left-color:var(--dorado);background:rgba(201,168,76,0.05);font-style:italic;}
    .msg-body.susurro{border-left-color:#7ec8e3;background:rgba(126,200,227,0.05);font-style:italic;}
    .msg-body.tirada{border-left-color:var(--rojo);background:rgba(192,57,43,0.06);}
    .msg-body.xp{border-left-color:var(--verde);background:rgba(46,204,113,0.05);}
    .msg-body.item{border-left-color:var(--dorado);background:rgba(201,168,76,0.06);}
    .msg-body.dinero{border-left-color:var(--dorado);background:rgba(201,168,76,0.06);}
    .msg-body.sistema{border-left-color:var(--muted);background:rgba(255,255,255,0.02);color:var(--muted);font-style:italic;}
    .msg-tipo-badge{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
    .chat-input-area{padding:10px;border-top:1px solid var(--borde);display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
    .chat-destino-selector{display:flex;gap:4px;}
    .dest-btn{flex:1;padding:4px 6px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:transparent;border:1px solid var(--borde);color:var(--muted);cursor:pointer;transition:all 0.15s;}
    .dest-btn.active{background:var(--sup3);border-color:var(--borde-r);color:var(--texto);}
    .dest-btn.privado-btn.active{border-color:var(--borde-d);color:var(--dorado);}
    .susurro-target{display:none;margin-top:4px;}
    .susurro-target.visible{display:block;}
    .chat-input-row{display:flex;gap:6px;}
    .chat-input{flex:1;height:36px;background:rgba(255,255,255,0.03);border:1px solid var(--borde);color:var(--texto);font-family:'Raleway',sans-serif;font-size:13px;padding:0 10px;outline:none;transition:border-color 0.2s;}
    .chat-input:focus{border-color:var(--borde-r);}
    .chat-send{width:36px;height:36px;background:var(--rojo);border:none;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
    .chat-send:hover{background:#e74c3c;}

    /* ══ MAPA ══ */
    .mapa-wrap{flex:1;position:relative;overflow:hidden;background:#080808;}
    #mapa-bg{position:absolute;inset:0;background-image:url('../imagenes/mapa.png');background-size:cover;background-position:center;}
    #canvas-tokens{position:absolute;inset:0;z-index:2;}
    #canvas-draw{position:absolute;inset:0;z-index:3;cursor:crosshair;touch-action:none;}
    #canvas-draw.puntero{cursor:default;}

    /* Imagen flotante DJ */
    .img-flotante{position:absolute;z-index:10;background:var(--sup2);border:2px solid var(--borde-d);box-shadow:0 8px 32px rgba(0,0,0,0.6);display:none;flex-direction:column;}
    .img-flotante.visible{display:flex;}
    .img-flotante-header{padding:6px 10px;background:rgba(201,168,76,0.08);display:flex;align-items:center;justify-content:space-between;cursor:move;user-select:none;}
    .img-flotante-titulo{font-size:11px;font-weight:700;color:var(--dorado);letter-spacing:0.08em;}
    .img-flotante-close{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px;}
    .img-flotante-close:hover{color:var(--texto);}
    .img-flotante img{max-width:360px;max-height:420px;object-fit:contain;display:block;}

    /* Herramientas mapa */
    .mapa-tools{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:6px;z-index:10;}
    .tool-btn{width:36px;height:36px;background:rgba(10,10,12,0.85);border:1px solid var(--borde);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;backdrop-filter:blur(4px);}
    .tool-btn:hover{border-color:var(--borde-r);color:var(--texto);}
    .tool-btn.active{background:var(--rojo);border-color:var(--rojo);color:white;}
    .color-picker-wrap{position:absolute;top:12px;right:54px;background:rgba(10,10,12,0.9);border:1px solid var(--borde);padding:8px;display:none;flex-direction:column;gap:6px;z-index:10;backdrop-filter:blur(4px);}
    .color-picker-wrap.open{display:flex;}
    .color-row{display:flex;gap:5px;}
    .color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s,transform 0.15s;}
    .color-dot:hover,.color-dot.active{border-color:white;transform:scale(1.2);}
    .brush-sizes{display:flex;gap:5px;align-items:center;}
    .brush-btn{background:transparent;border:1px solid var(--borde);color:var(--muted);font-size:11px;font-weight:700;padding:2px 7px;cursor:pointer;transition:all 0.15s;}
    .brush-btn.active{border-color:var(--rojo);color:var(--texto);}

    /* ══ BARRA ══ */
    .barra{height:var(--bar-h);flex-shrink:0;background:rgba(10,10,12,0.98);border-top:1px solid var(--borde);display:flex;align-items:center;padding:0 16px;gap:12px;}
    .dado-control{display:flex;align-items:center;gap:6px;}
    .dado-num-input{width:36px;height:36px;background:rgba(255,255,255,0.03);border:1px solid var(--borde);color:var(--texto);font-family:'Cinzel',serif;font-size:14px;font-weight:700;text-align:center;outline:none;transition:border-color 0.2s;}
    .dado-num-input:focus{border-color:var(--borde-r);}
    .dado-btn{display:flex;align-items:center;gap:7px;padding:0 14px;height:36px;background:var(--rojo);border:none;color:white;font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;}
    .dado-btn:hover{background:#e74c3c;}
    .barra-sep{width:1px;height:28px;background:var(--borde);}
    .barra-btn{display:flex;align-items:center;gap:6px;padding:0 14px;height:36px;background:transparent;border:1px solid var(--borde);color:var(--muted);font-family:'Raleway',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
    .barra-btn:hover{border-color:var(--borde-r);color:var(--texto);}
    .barra-btn.dj{border-color:var(--borde-d);color:var(--dorado);}
    .barra-btn.dj:hover{background:rgba(201,168,76,0.08);}

    /* ══ PANEL DJ ══ */
    .panel-dj{position:fixed;top:var(--nav-h);right:0;bottom:var(--bar-h);width:440px;background:var(--sup);border-left:1px solid var(--borde-d);display:flex;flex-direction:column;z-index:40;transform:translateX(100%);transition:transform 0.3s ease;}
    .panel-dj.open{transform:translateX(0);}
    .panel-dj-header{padding:14px 16px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(201,168,76,0.04);}
    .panel-dj-titulo{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--dorado);}
    .panel-close{width:28px;height:28px;background:transparent;border:1px solid var(--borde);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
    .panel-close:hover{border-color:var(--borde-r);color:var(--texto);}
    .panel-tabs{display:flex;border-bottom:1px solid var(--borde);flex-shrink:0;overflow-x:auto;}
    .panel-tab{padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s;background:transparent;border-top:none;border-left:none;border-right:none;}
    .panel-tab:hover{color:var(--sec);}
    .panel-tab.active{color:var(--dorado);border-bottom-color:var(--dorado);}
    .panel-body{flex:1;overflow-y:auto;padding:16px;}
    .panel-body::-webkit-scrollbar{width:3px;}
    .panel-body::-webkit-scrollbar-thumb{background:var(--borde-d);}

    /* Tab Jugadores */
    .jugador-ficha-card{background:var(--sup2);border:1px solid var(--borde);padding:14px;margin-bottom:10px;transition:border-color 0.2s;}
    .jugador-ficha-card:hover{border-color:var(--borde-d);}
    .jfc-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .jfc-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:15px;font-weight:700;border:2px solid;flex-shrink:0;}
    .jfc-info{flex:1;}
    .jfc-nombre{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--texto);}
    .jfc-sub{font-size:11px;color:var(--muted);}
    .jfc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
    .jfc-stat{background:var(--sup3);padding:6px 8px;text-align:center;}
    .jfc-stat-val{font-family:'Cinzel',serif;font-size:16px;font-weight:800;color:var(--texto);display:block;}
    .jfc-stat-val.dorado{color:var(--dorado);}
    .jfc-stat-lbl{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
    .estado-selector{display:flex;gap:4px;flex-wrap:wrap;}
    .est-btn{padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:transparent;border:1px solid var(--borde);color:var(--muted);cursor:pointer;transition:all 0.15s;}
    .est-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--texto);}
    .est-btn.active-sano{border-color:var(--verde);color:var(--verde);background:rgba(46,204,113,0.08);}
    .est-btn.active-herido{border-color:var(--amarillo);color:var(--amarillo);background:rgba(243,156,18,0.08);}
    .est-btn.active-grave{border-color:var(--naranja);color:var(--naranja);background:rgba(230,126,34,0.08);}
    .est-btn.active-critico{border-color:var(--rojo);color:var(--rojo);background:rgba(192,57,43,0.08);}
    .est-btn.active-ko{border-color:var(--muted);color:var(--muted);background:rgba(255,255,255,0.04);}

    /* XP */
    .xp-form{display:flex;flex-direction:column;gap:10px;}
    .form-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block;}
    .form-select,.form-input-vtt,.form-textarea-vtt{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--borde);color:var(--texto);font-family:'Raleway',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;}
    .form-select{height:38px;padding:0 10px;cursor:pointer;}
    .form-select option{background:var(--sup2);}
    .form-input-vtt{height:38px;padding:0 10px;}
    .form-textarea-vtt{padding:8px 10px;resize:vertical;min-height:70px;}
    .form-select:focus,.form-input-vtt:focus,.form-textarea-vtt:focus{border-color:var(--borde-d);}
    .criterios-grid{display:flex;flex-direction:column;gap:4px;}
    .criterio-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--sup2);border:1px solid var(--borde);cursor:pointer;transition:border-color 0.15s;}
    .criterio-item:hover{border-color:var(--borde-d);}
    .criterio-item.checked{border-color:var(--verde);background:rgba(46,204,113,0.05);}
    .criterio-check{width:16px;height:16px;border:1px solid var(--borde);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--verde);flex-shrink:0;}
    .criterio-item.checked .criterio-check{border-color:var(--verde);background:rgba(46,204,113,0.15);}
    .criterio-texto{font-size:12px;color:var(--sec);flex:1;line-height:1.4;}
    .xp-total-preview{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(46,204,113,0.06);border:1px solid rgba(46,204,113,0.25);}
    .xp-preview-label{font-size:12px;color:var(--sec);}
    .xp-preview-val{font-family:'Cinzel',serif;font-size:22px;font-weight:800;color:var(--verde);}
    .btn-accion-dj{width:100%;height:40px;background:var(--dorado);border:none;color:var(--negro);font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;margin-top:4px;}
    .btn-accion-dj:hover{background:#e2be6a;}
    .btn-accion-dj:disabled{opacity:0.5;cursor:not-allowed;}

    /* Inventario */
    .inv-tipo-selector{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
    .inv-tipo-btn{padding:4px 12px;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:transparent;border:1px solid var(--borde);color:var(--muted);cursor:pointer;transition:all 0.15s;}
    .inv-tipo-btn.active{border-color:var(--borde-d);color:var(--dorado);background:rgba(201,168,76,0.06);}

    /* ══ BIBLIOTECA CLOUDINARY ══ */
    .biblioteca-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
    .asset-card{position:relative;background:var(--sup3);border:1px solid var(--borde);overflow:hidden;cursor:pointer;transition:border-color 0.2s;aspect-ratio:16/10;}
    .asset-card:hover{border-color:var(--borde-d);}
    .asset-card img{width:100%;height:100%;object-fit:cover;display:block;}
    .asset-card-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
    .asset-card:hover .asset-card-overlay{opacity:1;}
    .asset-card-btn{padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;border:none;cursor:pointer;width:80%;}
    .asset-card-btn.show{background:var(--dorado);color:var(--negro);}
    .asset-card-btn.mapa{background:var(--rojo);color:white;}
    .asset-card-btn.del{background:transparent;border:1px solid rgba(255,255,255,0.3);color:white;}
    .asset-card-nombre{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:rgba(0,0,0,0.7);font-size:10px;color:var(--sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .upload-zona{border:2px dashed var(--borde-d);padding:20px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;margin-bottom:10px;}
    .upload-zona:hover{border-color:var(--dorado);background:rgba(201,168,76,0.04);}
    .upload-zona i{font-size:24px;color:var(--dorado);display:block;margin-bottom:6px;}
    .upload-zona p{font-size:12px;color:var(--muted);}
    .upload-progreso{height:3px;background:rgba(255,255,255,0.1);margin-top:8px;display:none;}
    .upload-progreso-bar{height:100%;background:var(--dorado);width:0%;transition:width 0.3s;}
    .biblioteca-tabs{display:flex;gap:6px;margin-bottom:12px;}
    .bib-tab{flex:1;padding:5px 8px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:transparent;border:1px solid var(--borde);color:var(--muted);cursor:pointer;transition:all 0.15s;text-align:center;}
    .bib-tab.active{border-color:var(--borde-d);color:var(--dorado);background:rgba(201,168,76,0.06);}

    /* Susurro / Mapa / Notas */
    .mapa-upload-area{border:2px dashed var(--borde-d);padding:24px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;margin-bottom:14px;}
    .mapa-upload-area:hover{border-color:var(--dorado);background:rgba(201,168,76,0.04);}
    .mapa-upload-area i{font-size:28px;color:var(--dorado);display:block;margin-bottom:8px;}
    .mapa-upload-area p{font-size:12px;color:var(--muted);}

</head>

<script type="module">
import { auth, db } from "../js/firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import {
  doc, getDoc, addDoc, updateDoc, deleteDoc,
  collection, query, where, orderBy,
  onSnapshot, serverTimestamp, limit
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

// ═══════════════════════════════════
// CLOUDINARY CONFIG
// ═══════════════════════════════════
const CLOUD_NAME   = 'davwzigvs';
const UPLOAD_PRESET = 'cdc-assets';

async function subirCloudinary(file, carpeta = 'general') {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', UPLOAD_PRESET);
  fd.append('folder', `cdc-assets/${CAMPANA_ID}/${carpeta}`);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method:'POST', body:fd });
  const data = await res.json();
  return { url: data.secure_url, public_id: data.public_id, nombre: file.name };
}

// ═══════════════════════════════════
// ESTADO
// ═══════════════════════════════════
let ME = null;
let MI_PERSONAJE = null;
let ES_DIRECTOR = false;
let CAMPANA_ID = null;
let CAMPANA_DATA = null;
let PERSONAJES_CAMPANA = [];
let drawColor = '#e74c3c';
let brushSize = 2;
let herramienta = 'lapiz';
let misLineas = [];
let unsubChat = null;
let unsubPersonajes = null;
let unsubMapa = null;
let destinoChat = 'general';
let criteriosCheck = new Array(8).fill(false);
let bibliotecaActiva = 'mapas';

const ATTRS_LABELS = {
  fuerza:'Fuerza', destreza:'Destreza', resistencia:'Resistencia',
  carisma:'Carisma', manipulacion:'Manipulación', compostura:'Compostura',
  percepcion:'Percepción', inteligencia:'Inteligencia', astucia:'Astucia'
};

const CRITERIOS_XP = [
  'Participó activamente en la sesión',
  'Interpretó correctamente a su personaje',
  'Tomó decisiones coherentes con su historia',
  'Aportó al grupo o a la misión',
  'Superó desafíos importantes',
  'Utilizó estrategias o ideas creativas',
  'Desarrolló conflictos o crecimiento narrativo',
  'Investigó, exploró o interactuó con el mundo',
];

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
const params = new URLSearchParams(window.location.search);
CAMPANA_ID = params.get('campana');
const ROL_PARAM = params.get('rol');

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '../vistas/login.html'; return; }
  ME = user;
  if (!CAMPANA_ID) { toast('No se especificó campaña.','error'); return; }

  const campSnap = await getDoc(doc(db,'campanas',CAMPANA_ID));
  if (!campSnap.exists()) { toast('Campaña no encontrada.','error'); return; }
  CAMPANA_DATA = { id:campSnap.id, ...campSnap.data() };
  document.getElementById('nav-campana-nombre').textContent = CAMPANA_DATA.nombre;

  ES_DIRECTOR = ROL_PARAM === 'director' ? true
              : ROL_PARAM === 'jugador'  ? false
              : CAMPANA_DATA.directorId === ME.uid;

  if (ES_DIRECTOR) {
    document.getElementById('btn-panel-dj').style.display = 'flex';
    document.getElementById('tool-borrar-todo').style.display = 'flex';
  }

  await cargarMiPersonaje();
  iniciarPersonajesRealtime();   // ← onSnapshot para personajes
  iniciarChatRealtime();         // ← onSnapshot para chat
  iniciarMapaRealtime();         // ← onSnapshot para mapa
  iniciarCanvas();
  cargarNotasJugador();
  poblarSusurroSelect();
  if (ES_DIRECTOR) renderTab('jugadores');
});

// ═══════════════════════════════════
// PERSONAJES EN TIEMPO REAL
// ═══════════════════════════════════
async function cargarMiPersonaje() {
  if (ES_DIRECTOR) return;
  const q = query(
    collection(db,'personajes'),
    where('userId','==',ME.uid),
    where('campanaId','==',CAMPANA_ID),
    limit(1)
  );
  const snap = await getDocs(q);
  if (!snap.empty) MI_PERSONAJE = { id:snap.docs[0].id, ...snap.docs[0].data() };
}

// getDocs necesita importarse también
import { getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

function iniciarPersonajesRealtime() {
  if (unsubPersonajes) unsubPersonajes();
  const q = query(collection(db,'personajes'), where('campanaId','==',CAMPANA_ID));
  unsubPersonajes = onSnapshot(q, snap => {
    PERSONAJES_CAMPANA = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    // Actualizar MI_PERSONAJE si cambió
    if (MI_PERSONAJE) {
      const updated = PERSONAJES_CAMPANA.find(p => p.id === MI_PERSONAJE.id);
      if (updated) MI_PERSONAJE = updated;
    }
    renderizarAvatares();
    // Si panel DJ está abierto y en tab jugadores, actualizar
    if (ES_DIRECTOR && tabActiva === 'jugadores') renderTab('jugadores');
  });
}

function renderizarAvatares() {
  const wrap = document.getElementById('avatares-online');
  const penMap = {sano:0,herido:-1,grave:-2,critico:-3,ko:-4};
  let html = '';

  // Avatar director
  if (ES_DIRECTOR) {
    const ini = (ME.displayName||'D').charAt(0).toUpperCase();
    html += `<div class="avatar-pill">
      <div class="avatar-circle" style="border-color:var(--dorado);color:var(--dorado);">${ini}</div>
      <span class="avatar-nombre" style="color:var(--dorado);">DJ</span>
      <div class="avatar-tooltip"><strong>${ME.displayName||'Director'}</strong><br>Director de Juego</div>
    </div>`;
  }

  html += PERSONAJES_CAMPANA.map(p => {
    const estado = p.estadoSalud || 'sano';
    const pen    = penMap[estado] || 0;
    const ini    = (p.nombre||'?').charAt(0).toUpperCase();
    const paMax  = p.atributos ? (p.atributos.resistencia||1)+3 : '?';
    const paAct  = p.paActual !== undefined ? p.paActual : paMax;
    const esPropio = p.userId === ME.uid;
    const penHtml  = pen < 0 ? `<div class="avatar-penalty">${pen}</div>` : '';
    return `<div class="avatar-pill" onclick="clickAvatar('${p.id}','${esPropio}')">
      <div style="position:relative;display:inline-block;">
        <div class="avatar-circle est-${estado}">${ini}</div>${penHtml}
      </div>
      <span class="avatar-nombre">${(p.nombre||'?').split(' ')[0]}</span>
      <div class="avatar-tooltip">
        <strong>${p.nombre||'?'}</strong> · Nv.${p.nivel||1}<br>
        PA: ${paAct}/${paMax} · ${estado}
        ${pen < 0 ? `<br>Penalización: ${pen}` : ''}

function hacerArrastrable(el, handle) {
  let ox=0, oy=0, mx=0, my=0;
  handle.onmousedown = e => {
    e.preventDefault();
    ox = el.offsetLeft; oy = el.offsetTop;
    mx = e.clientX;     my = e.clientY;
    document.onmousemove = ev => {
      el.style.left = (ox + ev.clientX - mx) + 'px';
      el.style.top  = (oy + ev.clientY - my) + 'px';
    };
    document.onmouseup = () => { document.onmousemove = null; document.onmouseup = null; };
  };
}

// ═══════════════════════════════════
let tokensData = {};

function renderTokensCanvas(tokens) {
  tokensData = tokens || {};
  const canvas = document.getElementById('canvas-tokens');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  Object.values(tokensData).forEach(t => {
    const x = t.x * canvas.width;
    const y = t.y * canvas.height;
    const r = 22;

    // Sombra
    ctx.shadowColor = t.color || '#c0392b';
    ctx.shadowBlur  = 8;

    // Círculo
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = t.color || '#c0392b';
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth   = 2;
    ctx.stroke();
    ctx.shadowBlur  = 0;

    // Inicial
    ctx.fillStyle = 'white';
    ctx.font = `bold 16px 'Cinzel', serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t.inicial || '?', x, y);

    // Nombre
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = '10px Raleway, sans-serif';
    ctx.fillText(t.nombre || '', x, y + r + 10);
  });
}

// Inicializar tokens para los personajes de la campaña
async function inicializarTokens() {
  const campSnap = await getDoc(doc(db,'campanas',CAMPANA_ID));
  const existing = campSnap.data().tokens || {};
  const nuevos   = { ...existing };
  let cambio = false;

  PERSONAJES_CAMPANA.forEach((p, i) => {
    if (!nuevos[p.id]) {
      nuevos[p.id] = {
        id:      p.id,
        nombre:  p.nombre?.split(' ')[0] || '?',
        inicial: (p.nombre||'?').charAt(0).toUpperCase(),
        color:   ['#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#16a085'][i%6],
        x: 0.1 + (i * 0.12),
        y: 0.5,
      };
      cambio = true;
    }
  });

  if (cambio) await updateDoc(doc(db,'campanas',CAMPANA_ID), { tokens: nuevos });
}

// Drag tokens en canvas
function iniciarTokenDrag() {
  const canvas = document.getElementById('canvas-tokens');
  let dragging = null;

  function getTokenBajo(cx, cy) {
    const r = 22;
    return Object.values(tokensData).find(t => {
      const tx = t.x * canvas.width;
      const ty = t.y * canvas.height;
      return Math.hypot(cx-tx, cy-ty) < r;
    });
  }

  canvas.addEventListener('pointerdown', e => {
    if (herramienta !== 'puntero') return;
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (canvas.width/rect.width);
    const cy = (e.clientY - rect.top)  * (canvas.height/rect.height);
    const t  = getTokenBajo(cx, cy);
    // Solo el dueño o el DJ puede mover
    const p  = PERSONAJES_CAMPANA.find(p => p.id === t?.id);
    if (t && (ES_DIRECTOR || p?.userId === ME.uid)) {
      dragging = t;
      canvas.setPointerCapture(e.pointerId);
    }
  });

  canvas.addEventListener('pointermove', async e => {
    if (!dragging) return;
    const rect = canvas.getBoundingClientRect();
    const nx = Math.max(0, Math.min(1, (e.clientX - rect.left) * (canvas.width/rect.width)  / canvas.width));
    const ny = Math.max(0, Math.min(1, (e.clientY - rect.top)  * (canvas.height/rect.height) / canvas.height));
    dragging.x = nx; dragging.y = ny;
    tokensData[dragging.id] = dragging;
    renderTokensCanvas(tokensData);
  });

  canvas.addEventListener('pointerup', async () => {
    if (!dragging) return;
    // Guardar en Firestore
    await updateDoc(doc(db,'campanas',CAMPANA_ID), {
      [`tokens.${dragging.id}.x`]: dragging.x,
      [`tokens.${dragging.id}.y`]: dragging.y,
    });
    dragging = null;
  });
}

function iniciarChatRealtime() {
  if (unsubChat) unsubChat();
  const q = query(
    collection(db,'campanas',CAMPANA_ID,'mensajes'),
    orderBy('timestamp','asc'), limit(150)
  );
  unsubChat = onSnapshot(q, snap => {
    const wrap = document.getElementById('chat-mensajes');
    wrap.innerHTML = '';
    snap.docs.forEach(d => {
      const msg = d.data();
      if ((msg.tipo==='privado'||msg.tipo==='susurro') && !ES_DIRECTOR) {
        if (msg.paraId !== ME.uid && msg.autorId !== ME.uid) return;
      }
      wrap.appendChild(renderMensaje(msg));
    });
    wrap.scrollTop = wrap.scrollHeight;
  });
}

function renderMensaje(msg) {
  const div  = document.createElement('div');
  div.className = 'msg';
  const hora = msg.timestamp?.toDate
    ? msg.timestamp.toDate().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})
    : '';
  let contenido = '';
  const tipo = msg.tipo || 'general';

  if (tipo === 'tirada') {
    function colorDado(n) {
      if (n===1) return '#e74c3c';
      if (n<=3)  return '#6b6673';
      if (n<=5)  return '#e8e2d9';
      return '#2ecc71';
    }
    function glowDado(n) {
      if (n===1) return '0 0 6px #e74c3c66';
      if (n===6) return '0 0 6px #2ecc7166';
      return 'none';
    }
    const total = msg.resultados?.reduce((a,b)=>a+b,0)||0;
    const dadosHTML = (msg.resultados||[]).map(r => {
      const col  = colorDado(r);
      const glow = glowDado(r);
      return `<span style="font-family:Cinzel,serif;font-size:14px;font-weight:800;color:${col};background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);padding:2px 7px;margin:2px;display:inline-block;box-shadow:${glow};">${r<=1?'1':r>=6?'6':r<=3?'✗':'✓'}</span>`;
    }).join('');
    contenido = `<div class="msg-tipo-badge">🎲 ${msg.cantidad}d6 — Total: <strong style="color:var(--texto)">${total}</strong></div><div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:6px;">${dadosHTML}</div>`;
  } else if (tipo==='xp') {
    contenido = `⭐ <strong>${msg.paraName}</strong> recibió <strong>${msg.xp} XP</strong>${msg.motivo?` — ${msg.motivo}`:''}`;
  } else if (tipo==='item') {
    contenido = `🎒 <strong>${msg.paraName}</strong> recibió: <strong>${msg.item}</strong>${msg.cantidad>1?` ×${msg.cantidad}`:''}`;
  } else if (tipo==='dinero') {
    contenido = `💰 <strong>${msg.paraName}</strong> recibió <strong>${msg.cantidad} Jenny</strong>`;
  } else if (tipo==='privado') {
    contenido = `🔒 <em>(Privado al DJ)</em> ${msg.texto}`;
  } else if (tipo==='susurro') {
    contenido = `🔒 <em>(Susurro de DJ)</em> ${msg.texto}`;
  } else if (tipo==='sistema') {
    contenido = msg.texto;
  } else {
    contenido = msg.texto;
  }

  div.innerHTML = `
    <div class="msg-header">
      <span class="msg-autor">${msg.autorNombre||'?'}</span>
      <span class="msg-hora">${hora}</span>
    </div>
    <div class="msg-body ${tipo}">${contenido}</div>`;
  return div;
}

// ═══════════════════════════════════
// CANVAS DIBUJO
// ═══════════════════════════════════
function iniciarCanvas() {
  const drawCanvas  = document.getElementById('canvas-draw');
  const tokenCanvas = document.getElementById('canvas-tokens');
  const ctx = drawCanvas.getContext('2d');
  let dibujando = false;

  function resize() {
    const w = drawCanvas.parentElement.offsetWidth;
    const h = drawCanvas.parentElement.offsetHeight;
    if (drawCanvas.width===w && drawCanvas.height===h) return;
    const tmp = document.createElement('canvas');
    tmp.width=drawCanvas.width; tmp.height=drawCanvas.height;
    tmp.getContext('2d').drawImage(drawCanvas,0,0);
    drawCanvas.width=w; drawCanvas.height=h;
    tokenCanvas.width=w; tokenCanvas.height=h;
    ctx.drawImage(tmp,0,0);
    if (Object.keys(tokensData).length) renderTokensCanvas(tokensData);
  }

  requestAnimationFrame(() => {
    resize();
    window.addEventListener('resize', resize);
    // Inicializar tokens después de cargar personajes
    setTimeout(() => { inicializarTokens(); iniciarTokenDrag(); }, 1500);
  });

  function getPos(e) {
    const rect = drawCanvas.getBoundingClientRect();
    return {
      x: (e.clientX-rect.left)*(drawCanvas.width/rect.width),
      y: (e.clientY-rect.top)*(drawCanvas.height/rect.height)
    };
  }

  drawCanvas.addEventListener('pointerdown', e => {
    if (herramienta!=='lapiz') return;
    dibujando = true;
    drawCanvas.setPointerCapture(e.pointerId);
    const pos = getPos(e);
    ctx.beginPath(); ctx.moveTo(pos.x,pos.y);
    misLineas.push({color:drawColor,size:brushSize,puntos:[[pos.x,pos.y]]});
  });

  drawCanvas.addEventListener('pointermove', e => {
    if (!dibujando||herramienta!=='lapiz') return;
    const pos = getPos(e);
    ctx.strokeStyle=drawColor; ctx.lineWidth=brushSize;
    ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.lineTo(pos.x,pos.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pos.x,pos.y);
    if (misLineas.length) misLineas[misLineas.length-1].puntos.push([pos.x,pos.y]);
  });

  drawCanvas.addEventListener('pointerup', ()=>{ dibujando=false; ctx.beginPath(); });
  drawCanvas.addEventListener('pointercancel', ()=>{ dibujando=false; ctx.beginPath(); });
}

};

// Cargar assets desde Firestore (guardamos las URLs ahí)
async function cargarAssets() {
  const grid = document.getElementById('bib-grid');
  if (!grid) return;
  try {
    const q = query(
      collection(db,'campanas',CAMPANA_ID,'assets'),
      where('carpeta','==',bibliotecaActiva),
      orderBy('creadoEn','desc')
    );
    const snap = await getDocs(q);
    const assets = snap.docs.map(d=>({id:d.id,...d.data()}));
    if (!assets.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--muted);font-size:12px;font-style:italic;">Sin imágenes en ${bibliotecaActiva} todavía.</div>`;
      return;
    }
    grid.innerHTML = assets.map(a => `
      <div class="asset-card">
        <img src="${a.url}" alt="${a.nombre}" loading="lazy">
        <div class="asset-card-nombre">${a.nombre}</div>
        <div class="asset-card-overlay">
          ${bibliotecaActiva==='mapas'
            ? `<button class="asset-card-btn mapa" onclick="cambiarMapaRT('${a.url}')">🗺️ Usar como mapa</button>`
            : `<button class="asset-card-btn show" onclick="mostrarImgRT('${a.url}','${a.nombre}')">👁️ Mostrar a todos</button>`}
          <button class="asset-card-btn del" onclick="eliminarAsset('${a.id}','${a.public_id}')">🗑️ Eliminar</button>
        </div>
      </div>`).join('');
  } catch(err) {
    grid.innerHTML = `<div style="color:#e74c3c;font-size:12px;grid-column:1/-1;">Error: ${err.message}</div>`;
  }
}

window.subirImagen = async function(input) {
  if (!input.files||!input.files[0]) return;
  const file = input.files[0];
  const prog = document.getElementById('upload-progreso');
  const barra = document.getElementById('upload-barra');
  prog.style.display = 'block';
  barra.style.width = '30%';

  try {
    const result = await subirCloudinary(file, bibliotecaActiva);
    barra.style.width = '80%';

    // Guardar referencia en Firestore
    await addDoc(collection(db,'campanas',CAMPANA_ID,'assets'), {
      url:       result.url,
      public_id: result.public_id,
      nombre:    result.nombre,
      carpeta:   bibliotecaActiva,
      creadoEn:  serverTimestamp(),
    });

    barra.style.width = '100%';
    setTimeout(() => { prog.style.display='none'; barra.style.width='0%'; }, 500);
    toast(`${file.name} subido a ${bibliotecaActiva}.`,'success');
    cargarAssets();
  } catch(err) {
    toast('Error al subir: '+err.message,'error');
    prog.style.display='none';
  }
  input.value = '';
};

    b.className='esj-btn';

window.jugadorCambiarPA = async function(personajeId, actual, maximo, delta) {
  const nuevo = Math.max(0, Math.min(maximo, actual+delta));
  await updateDoc(doc(db,'personajes',personajeId), {paActual:nuevo});
  const el = document.getElementById('pa-display-'+personajeId);
  if (el) el.textContent=nuevo;
  const btns = document.querySelectorAll('.pa-btn');
  if (btns[0]) btns[0].setAttribute('onclick',`jugadorCambiarPA('${personajeId}',${nuevo},${maximo},-1)`);
  if (btns[1]) btns[1].setAttribute('onclick',`jugadorCambiarPA('${personajeId}',${nuevo},${maximo},1)`);
  if (MI_PERSONAJE) MI_PERSONAJE.paActual=nuevo;
};

window.jugadorUsarObjeto = async function(personajeId, idx) {
  const pRef=doc(db,'personajes',personajeId);
  const pSnap=await getDoc(pRef);
  const objetos=[...(pSnap.data().objetos||[])];
  if (!objetos[idx]) return;
  const nombreObj=objetos[idx].nombre;
  objetos[idx].cantidad=(objetos[idx].cantidad||1)-1;
  if(objetos[idx].cantidad<=0) { objetos.splice(idx,1); toast(`${nombreObj} agotado.`,'info'); }
  else { toast(`${nombreObj} usado. Quedan ${objetos[idx].cantidad}.`,'success'); }
  await updateDoc(pRef,{objetos});
  const autorNombre = MI_PERSONAJE?.nombre||ME.displayName||'Cazador';
  await addDoc(collection(db,'campanas',CAMPANA_ID,'mensajes'), {
    autorId:ME.uid, autorNombre, tipo:'sistema',
    texto:`🎒 ${autorNombre} usó ${nombreObj}.`, timestamp:serverTimestamp(),
  });
  if (MI_PERSONAJE) MI_PERSONAJE.objetos=objetos;
  const pData={...pSnap.data(),objetos,id:personajeId};
  abrirFichaPersonaje(pData);
};

window.jugadorDescartarArma = async function(personajeId, idx) {
  const pRef=doc(db,'personajes',personajeId);
  const pSnap=await getDoc(pRef);
  const armas=[...(pSnap.data().armas||[])];
  const nombreArma=armas[idx]?.nombre||'Arma';
  armas.splice(idx,1);
  await updateDoc(pRef,{armas});
  toast(`${nombreArma} descartada.`,'info');
  if (MI_PERSONAJE) MI_PERSONAJE.armas=armas;
  const pData={...pSnap.data(),armas,id:personajeId};
  abrirFichaPersonaje(pData);
};

// Notas jugador
function cargarNotasJugador() {
  const guardadas = localStorage.getItem(`notas-jugador-${CAMPANA_ID}-${ME.uid}`)||'';
  const area = document.getElementById('notas-jugador');
  if (area) area.value=guardadas;
}
window.guardarNotasJugador = () => localStorage.setItem(`notas-jugador-${CAMPANA_ID}-${ME.uid}`, document.getElementById('notas-jugador')?.value||'');
window.abrirNotas = () => document.getElementById('modal-notas').classList.add('open');

// Modales
window.cerrarModal = id => document.getElementById(id).classList.remove('open');
window.cerrarModalFuera = (e,id) => { if(e.target.id===id) cerrarModal(id); };

// Toast
function toast(msg, tipo) {
  const t=document.getElementById('toast');
  const cfg={
    success:{bg:'rgba(26,74,46,0.95)',border:'#2d7a4a',color:'#7ad49a'},
    error:  {bg:'rgba(80,19,19,0.95)',border:'#e74c3c',color:'#ff8080'},
    info:   {bg:'rgba(14,18,24,0.95)',border:'var(--dorado)',color:'var(--dorado)'},
  }[tipo]||{bg:'rgba(14,18,24,0.95)',border:'var(--borde-d)',color:'var(--sec)'};
  Object.assign(t.style,{background:cfg.bg,borderColor:cfg.border,color:cfg.color,opacity:'1'});
  t.textContent=msg;
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.opacity='0';},3500);
}
window.toast=toast;
</script>
