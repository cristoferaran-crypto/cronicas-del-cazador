<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTT | Crónicas del Cazador</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root {
      --rojo: #c0392b; --rojo-g: rgba(192,57,43,0.3);
      --dorado: #c9a84c; --dorado-g: rgba(201,168,76,0.25);
      --negro: #0a0a0c; --sup: #111117; --sup2: #16161e; --sup3: #1e1e28;
      --borde: rgba(255,255,255,0.07); --borde-r: rgba(192,57,43,0.35); --borde-d: rgba(201,168,76,0.3);
      --texto: #e8e2d9; --muted: #8a8490; --sec: #b0aab8;
      --verde: #2ecc71; --amarillo: #f39c12; --naranja: #e67e22;
      --chat-w: 300px; --bar-h: 60px; --nav-h: 52px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Raleway', sans-serif; background: var(--negro); color: var(--texto); display: flex; flex-direction: column; }

    /* ══ NAVBAR ══ */
    .navbar {
      height: var(--nav-h); flex-shrink: 0;
      background: rgba(10,10,12,0.98); border-bottom: 1px solid var(--borde);
      display: flex; align-items: center; padding: 0 16px; gap: 10px;
      z-index: 50;
    }
    .nav-logo img { height: 28px; filter: invert(1) brightness(0.8) mix-blend-mode:screen; }
    .nav-campana { font-family:'Cinzel',serif; font-size:13px; font-weight:700; color:var(--texto); margin-right: auto; }
    .nav-campana span { color: var(--dorado); }

    /* Avatares online */
    .avatares-online { display:flex; gap:6px; align-items:center; }
    .avatar-pill {
      position: relative; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .avatar-circle {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700;
      border: 2px solid; flex-shrink: 0;
      transition: transform 0.15s;
    }
    .avatar-circle:hover { transform: scale(1.1); }
    .avatar-tooltip {
      position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%);
      background: var(--sup2); border: 1px solid var(--borde-d);
      padding: 6px 10px; white-space: nowrap; font-size: 11px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      z-index: 100;
    }
    .avatar-pill:hover .avatar-tooltip { opacity: 1; }
    .avatar-nombre { font-size: 9px; color: var(--muted); font-weight: 600; letter-spacing: 0.05em; max-width: 36px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Estado colores */
    .est-sano    { border-color: var(--verde);    color: var(--verde); }
    .est-herido  { border-color: var(--amarillo); color: var(--amarillo); }
    .est-grave   { border-color: var(--naranja);  color: var(--naranja); }
    .est-critico { border-color: var(--rojo);     color: var(--rojo); }
    .est-ko      { border-color: var(--muted);    color: var(--muted); }

    /* Botones navbar */
    .nav-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 12px; height: 32px;
      background: transparent; border: 1px solid var(--borde);
      color: var(--muted); font-family:'Raleway',sans-serif;
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer; text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .nav-btn:hover { border-color: var(--borde-r); color: var(--texto); }
    .nav-btn.dj { border-color: var(--borde-d); color: var(--dorado); }
    .nav-btn.dj:hover { background: rgba(201,168,76,0.08); }

    /* ══ MAIN AREA ══ */
    .main {
      flex: 1; display: flex; overflow: hidden;
      height: calc(100vh - var(--nav-h) - var(--bar-h));
    }

    /* ══ CHAT ══ */
    .chat-panel {
      width: var(--chat-w); flex-shrink: 0;
      background: var(--sup); border-right: 1px solid var(--borde);
      display: flex; flex-direction: column;
    }
    .chat-header {
      padding: 10px 14px; border-bottom: 1px solid var(--borde);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-header-titulo { font-family:'Cinzel',serif; font-size:12px; font-weight:700; color:var(--texto); }
    .chat-mensajes {
      flex: 1; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .chat-mensajes::-webkit-scrollbar { width: 3px; }
    .chat-mensajes::-webkit-scrollbar-thumb { background: var(--borde-r); }

    /* Burbujas */
    .msg { display: flex; flex-direction: column; gap: 2px; max-width: 100%; }
    .msg-header { display: flex; align-items: center; gap: 6px; }
    .msg-autor { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; color: var(--dorado); }
    .msg-hora   { font-size: 9px; color: var(--muted); }
    .msg-body {
      font-size: 12px; line-height: 1.5; color: var(--sec);
      background: var(--sup2); border: 1px solid var(--borde);
      padding: 7px 10px; border-left: 2px solid transparent;
    }
    .msg-body.general   { border-left-color: var(--borde); }
    .msg-body.privado   { border-left-color: var(--dorado); background: rgba(201,168,76,0.05); font-style: italic; }
    .msg-body.susurro   { border-left-color: #7ec8e3; background: rgba(126,200,227,0.05); font-style: italic; }
    .msg-body.tirada    { border-left-color: var(--rojo); background: rgba(192,57,43,0.06); }
    .msg-body.xp        { border-left-color: var(--verde); background: rgba(46,204,113,0.05); }
    .msg-body.item      { border-left-color: var(--dorado); background: rgba(201,168,76,0.06); }
    .msg-body.sistema   { border-left-color: var(--muted); background: rgba(255,255,255,0.02); color: var(--muted); font-style: italic; }
    .msg-tipo-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 2px;
    }
    .msg-dado-resultado {
      font-family:'Cinzel',serif; font-size: 20px; font-weight: 800;
      display: block; margin-top: 2px;
    }
    .dado-max { color: var(--dorado); text-shadow: 0 0 8px var(--dorado-g); }
    .dado-min { color: var(--muted); }
    .dado-normal { color: var(--texto); }

    /* Input chat */
    .chat-input-area {
      padding: 10px; border-top: 1px solid var(--borde);
      display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
    }
    .chat-destino-selector {
      display: flex; gap: 4px;
    }
    .dest-btn {
      flex: 1; padding: 4px 6px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: transparent; border: 1px solid var(--borde);
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .dest-btn.active { background: var(--sup3); border-color: var(--borde-r); color: var(--texto); }
    .dest-btn.privado-btn.active { border-color: var(--borde-d); color: var(--dorado); }

    .chat-input-row { display: flex; gap: 6px; }
    .chat-input {
      flex: 1; height: 36px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--borde);
      color: var(--texto); font-family:'Raleway',sans-serif; font-size:13px;
      padding: 0 10px; outline: none; transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--borde-r); }
    .chat-send {
      width: 36px; height: 36px;
      background: var(--rojo); border: none; color: white;
      font-size: 16px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .chat-send:hover { background: #e74c3c; }

    /* ══ MAPA ══ */
    .mapa-wrap {
      flex: 1; position: relative; overflow: hidden;
      background: #080808;
    }
    #mapa-bg {
      position: absolute; inset: 0;
      background-image: url('../imagenes/mapa.png');
      background-size: cover; background-position: center;
    }
    #canvas-draw {
      position: absolute; inset: 0;
      cursor: crosshair; touch-action: none;
    }
    #canvas-draw.puntero { cursor: default; }

    /* Herramientas mapa */
    .mapa-tools {
      position: absolute; top: 12px; right: 12px;
      display: flex; flex-direction: column; gap: 6px;
      z-index: 10;
    }
    .tool-btn {
      width: 36px; height: 36px;
      background: rgba(10,10,12,0.85); border: 1px solid var(--borde);
      color: var(--muted); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; backdrop-filter: blur(4px);
    }
    .tool-btn:hover { border-color: var(--borde-r); color: var(--texto); }
    .tool-btn.active { background: var(--rojo); border-color: var(--rojo); color: white; }

    .color-picker-wrap {
      position: absolute; top: 12px; right: 54px;
      background: rgba(10,10,12,0.9); border: 1px solid var(--borde);
      padding: 8px; display: none; flex-direction: column; gap: 6px;
      z-index: 10; backdrop-filter: blur(4px);
    }
    .color-picker-wrap.open { display: flex; }
    .color-row { display: flex; gap: 5px; }
    .color-dot {
      width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.15s, transform 0.15s;
    }
    .color-dot:hover, .color-dot.active { border-color: white; transform: scale(1.2); }
    .brush-sizes { display: flex; gap: 5px; align-items: center; }
    .brush-btn {
      background: transparent; border: 1px solid var(--borde);
      color: var(--muted); font-size: 11px; font-weight: 700;
      padding: 2px 7px; cursor: pointer; transition: all 0.15s;
    }
    .brush-btn.active { border-color: var(--rojo); color: var(--texto); }

    /* ══ BARRA INFERIOR ══ */
    .barra {
      height: var(--bar-h); flex-shrink: 0;
      background: rgba(10,10,12,0.98); border-top: 1px solid var(--borde);
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
    }
    .dado-control {
      display: flex; align-items: center; gap: 6px;
    }
    .dado-num {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--borde);
      color: var(--texto); font-family:'Cinzel',serif; font-size: 14px;
      font-weight: 700; text-align: center; outline: none;
      transition: border-color 0.2s;
    }
    .dado-num:focus { border-color: var(--borde-r); }
    .dado-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 0 14px; height: 36px;
      background: var(--rojo); border: none; color: white;
      font-family:'Cinzel',serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: background 0.15s;
    }
    .dado-btn:hover { background: #e74c3c; }
    .barra-sep { width: 1px; height: 28px; background: var(--borde); }
    .barra-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 36px;
      background: transparent; border: 1px solid var(--borde);
      color: var(--muted); font-family:'Raleway',sans-serif;
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .barra-btn:hover { border-color: var(--borde-r); color: var(--texto); }
    .barra-btn.dj { border-color: var(--borde-d); color: var(--dorado); }
    .barra-btn.dj:hover { background: rgba(201,168,76,0.08); }

    /* ══ PANEL DJ ══ */
    .panel-dj {
      position: fixed; top: var(--nav-h); right: 0; bottom: var(--bar-h);
      width: 420px; background: var(--sup);
      border-left: 1px solid var(--borde-d);
      display: flex; flex-direction: column;
      z-index: 40; transform: translateX(100%);
      transition: transform 0.3s ease;
    }
    .panel-dj.open { transform: translateX(0); }

    .panel-dj-header {
      padding: 14px 16px; border-bottom: 1px solid var(--borde);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; background: rgba(201,168,76,0.04);
    }
    .panel-dj-titulo { font-family:'Cinzel',serif; font-size:14px; font-weight:700; color:var(--dorado); }
    .panel-close {
      width: 28px; height: 28px; background: transparent;
      border: 1px solid var(--borde); color: var(--muted);
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .panel-close:hover { border-color: var(--borde-r); color: var(--texto); }

    /* Tabs */
    .panel-tabs {
      display: flex; border-bottom: 1px solid var(--borde);
      flex-shrink: 0; overflow-x: auto;
    }
    .panel-tab {
      padding: 9px 14px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      background: transparent; border-top: none; border-left: none; border-right: none;
    }
    .panel-tab:hover { color: var(--sec); }
    .panel-tab.active { color: var(--dorado); border-bottom-color: var(--dorado); }

    .panel-body { flex: 1; overflow-y: auto; padding: 16px; }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--borde-d); }

    /* Tab: Jugadores */
    .jugador-ficha-card {
      background: var(--sup2); border: 1px solid var(--borde);
      padding: 14px; margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .jugador-ficha-card:hover { border-color: var(--borde-d); }
    .jfc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .jfc-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family:'Cinzel',serif; font-size:15px; font-weight:700;
      border: 2px solid; flex-shrink: 0;
    }
    .jfc-info { flex: 1; }
    .jfc-nombre { font-family:'Cinzel',serif; font-size:14px; font-weight:700; color:var(--texto); }
    .jfc-sub { font-size:11px; color:var(--muted); }
    .jfc-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .jfc-stat {
      background: var(--sup3); padding: 6px 8px; text-align: center;
    }
    .jfc-stat-val { font-family:'Cinzel',serif; font-size:16px; font-weight:800; color:var(--texto); display:block; }
    .jfc-stat-val.dorado { color: var(--dorado); }
    .jfc-stat-lbl { font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }

    /* Estado salud selector */
    .estado-selector { display:flex; gap:4px; flex-wrap:wrap; }
    .est-btn {
      padding: 3px 10px; font-size:10px; font-weight:700;
      letter-spacing:0.08em; text-transform:uppercase;
      background: transparent; border: 1px solid var(--borde);
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .est-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--texto); }
    .est-btn.active-sano    { border-color: var(--verde);    color: var(--verde);    background: rgba(46,204,113,0.08); }
    .est-btn.active-herido  { border-color: var(--amarillo); color: var(--amarillo); background: rgba(243,156,18,0.08); }
    .est-btn.active-grave   { border-color: var(--naranja);  color: var(--naranja);  background: rgba(230,126,34,0.08); }
    .est-btn.active-critico { border-color: var(--rojo);     color: var(--rojo);     background: rgba(192,57,43,0.08); }
    .est-btn.active-ko      { border-color: var(--muted);    color: var(--muted);    background: rgba(255,255,255,0.04); }

    /* Tab: XP */
    .xp-form { display:flex; flex-direction:column; gap:10px; }
    .form-label { font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; display:block; }
    .form-select, .form-input-vtt, .form-textarea-vtt {
      width: 100%;
      background: rgba(255,255,255,0.03); border: 1px solid var(--borde);
      color: var(--texto); font-family:'Raleway',sans-serif;
      font-size:13px; outline:none; transition: border-color 0.2s;
    }
    .form-select { height:38px; padding:0 10px; cursor:pointer; }
    .form-select option { background: var(--sup2); }
    .form-input-vtt { height:38px; padding:0 10px; }
    .form-textarea-vtt { padding:8px 10px; resize:vertical; min-height:70px; }
    .form-select:focus, .form-input-vtt:focus, .form-textarea-vtt:focus { border-color: var(--borde-d); }

    /* Criterios XP */
    .criterios-grid { display:flex; flex-direction:column; gap:4px; }
    .criterio-item {
      display:flex; align-items:center; gap:8px;
      padding:6px 8px; background:var(--sup2); border:1px solid var(--borde);
      cursor:pointer; transition: border-color 0.15s;
    }
    .criterio-item:hover { border-color: var(--borde-d); }
    .criterio-item.checked { border-color: var(--verde); background: rgba(46,204,113,0.05); }
    .criterio-check {
      width:16px; height:16px; border:1px solid var(--borde);
      display:flex; align-items:center; justify-content:center;
      font-size:10px; color:var(--verde); flex-shrink:0;
    }
    .criterio-item.checked .criterio-check { border-color:var(--verde); background:rgba(46,204,113,0.15); }
    .criterio-texto { font-size:12px; color:var(--sec); flex:1; line-height:1.4; }
    .xp-total-preview {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 12px; background:rgba(46,204,113,0.06); border:1px solid rgba(46,204,113,0.25);
    }
    .xp-preview-label { font-size:12px; color:var(--sec); }
    .xp-preview-val { font-family:'Cinzel',serif; font-size:22px; font-weight:800; color:var(--verde); }

    .btn-accion-dj {
      width:100%; height:40px;
      background:var(--dorado); border:none; color:var(--negro);
      font-family:'Cinzel',serif; font-size:12px; font-weight:700;
      letter-spacing:0.12em; text-transform:uppercase;
      cursor:pointer; transition:background 0.15s; margin-top:4px;
    }
    .btn-accion-dj:hover { background:var(--dorado-hover,#e2be6a); }
    .btn-accion-dj:disabled { opacity:0.5; cursor:not-allowed; }

    /* Tab: Inventario */
    .inv-tipo-selector { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .inv-tipo-btn {
      padding:4px 12px; font-size:11px; font-weight:700;
      letter-spacing:0.08em; text-transform:uppercase;
      background:transparent; border:1px solid var(--borde);
      color:var(--muted); cursor:pointer; transition:all 0.15s;
    }
    .inv-tipo-btn.active { border-color:var(--borde-d); color:var(--dorado); background:rgba(201,168,76,0.06); }

    /* Tab: Mapa */
    .mapa-upload-area {
      border: 2px dashed var(--borde-d); padding:24px;
      text-align:center; cursor:pointer;
      transition:border-color 0.2s, background 0.2s;
      margin-bottom:14px;
    }
    .mapa-upload-area:hover { border-color:var(--dorado); background:rgba(201,168,76,0.04); }
    .mapa-upload-area i { font-size:28px; color:var(--dorado); display:block; margin-bottom:8px; }
    .mapa-upload-area p { font-size:12px; color:var(--muted); }

    /* Tab: Notas DJ */
    .notas-dj-area {
      width:100%; min-height:300px; background:rgba(255,255,255,0.02);
      border:1px solid var(--borde); color:var(--texto);
      font-family:'Raleway',sans-serif; font-size:13px;
      padding:12px; outline:none; resize:vertical;
      transition:border-color 0.2s; line-height:1.6;
    }
    .notas-dj-area:focus { border-color:var(--borde-d); }

    /* Susurro selector */
    .susurro-target {
      display:none; margin-top:4px;
    }
    .susurro-target.visible { display:block; }

    /* ══ MODAL FICHA ══ */
    .modal-overlay {
      position:fixed; inset:0; z-index:200;
      background:rgba(0,0,0,0.85); backdrop-filter:blur(4px);
      display:flex; align-items:center; justify-content:center;
      padding:20px; opacity:0; pointer-events:none; transition:opacity 0.2s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal-ficha {
      background:var(--sup2); border:1px solid var(--borde-r);
      border-top:2px solid var(--rojo);
      width:100%; max-width:600px; max-height:90vh;
      overflow-y:auto; transform:translateY(14px); transition:transform 0.25s;
    }
    .modal-overlay.open .modal-ficha { transform:translateY(0); }
    .modal-ficha::-webkit-scrollbar { width:3px; }
    .modal-ficha::-webkit-scrollbar-thumb { background:var(--borde-r); }
    .modal-ficha-header {
      padding:16px 20px; border-bottom:1px solid var(--borde);
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; background:var(--sup2); z-index:2;
    }
    .modal-ficha-titulo { font-family:'Cinzel',serif; font-size:18px; font-weight:800; color:var(--texto); }
    .modal-ficha-body { padding:20px; }
    .ficha-seccion { margin-bottom:20px; }
    .ficha-seccion-titulo {
      font-size:10px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase;
      color:var(--rojo); margin-bottom:10px; padding-bottom:6px;
      border-bottom:1px solid var(--borde);
    }
    .ficha-attrs { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
    .ficha-attr {
      background:var(--sup3); padding:8px; text-align:center;
    }
    .ficha-attr-val { font-family:'Cinzel',serif; font-size:20px; font-weight:800; color:var(--texto); display:block; }
    .ficha-attr-lbl { font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
    .ficha-skills-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
    .ficha-skill-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:4px 8px; background:var(--sup3); font-size:12px;
    }
    .ficha-skill-nombre { color:var(--sec); }
    .ficha-skill-val { font-family:'Cinzel',serif; font-weight:700; color:var(--texto); }

    /* ══ MODAL NOTAS ══ */
    .modal-notas {
      background:var(--sup2); border:1px solid var(--borde);
      border-top:2px solid var(--dorado);
      width:100%; max-width:500px;
      transform:translateY(14px); transition:transform 0.25s;
    }
    .modal-overlay.open .modal-notas { transform:translateY(0); }
    .modal-notas-header {
      padding:14px 18px; border-bottom:1px solid var(--borde);
      display:flex; align-items:center; justify-content:space-between;
    }
    .notas-jugador-area {
      width:100%; min-height:280px; background:rgba(255,255,255,0.02);
      border:none; color:var(--texto); font-family:'Raleway',sans-serif;
      font-size:13px; padding:16px; outline:none; resize:none;
      line-height:1.6;
    }

    .btn-cerrar-modal {
      width:28px; height:28px; background:transparent;
      border:1px solid var(--borde); color:var(--muted);
      cursor:pointer; font-size:16px;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.15s;
    }
    .btn-cerrar-modal:hover { border-color:var(--borde-r); color:var(--texto); }

    /* Toast */
    #toast {
      position:fixed; bottom:70px; right:16px; z-index:999;
      padding:10px 16px; border-left:3px solid;
      font-family:'Raleway',sans-serif; font-size:12px; font-weight:600;
      opacity:0; transition:opacity 0.3s; pointer-events:none; max-width:280px;
    }

    /* ══ PENALIZACIÓN AVATAR ══ */
    .avatar-penalty {
      position: absolute; top: -4px; right: -4px;
      background: var(--rojo); color: white;
      font-size: 9px; font-weight: 800;
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--negro);
    }

    /* ══ FICHA TABS ══ */
    .ficha-tabs {
      display: flex; border-bottom: 1px solid var(--borde);
      position: sticky; top: 52px; background: var(--sup2); z-index: 2;
    }
    .ficha-tab {
      flex: 1; padding: 10px 8px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; text-align: center;
      border-bottom: 2px solid transparent;
      background: transparent; border-top: none;
      border-left: none; border-right: none;
      transition: color 0.15s, border-color 0.15s;
    }
    .ficha-tab:hover { color: var(--sec); }
    .ficha-tab.active { color: var(--rojo); border-bottom-color: var(--rojo); }

    .ficha-tab-body { display: none; padding: 16px 20px; }
    .ficha-tab-body.active { display: block; }

    /* PA control */
    .pa-control {
      display: flex; align-items: center; gap: 10px;
      background: var(--sup3); padding: 12px 16px;
      border: 1px solid var(--borde); margin-bottom: 12px;
    }
    .pa-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); flex: 1;
    }
    .pa-btn {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--borde);
      color: var(--muted); font-size: 18px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.15s;
      font-family: 'Raleway', sans-serif;
    }
    .pa-btn:hover { background: var(--rojo); border-color: var(--rojo); color: white; }
    .pa-val {
      font-family: 'Cinzel', serif; font-size: 26px;
      font-weight: 800; color: var(--texto); min-width: 40px;
      text-align: center;
    }
    .pa-max { font-size: 12px; color: var(--muted); }

    /* Estado control jugador */
    .estado-jugador-selector {
      display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .esj-btn {
      flex: 1; padding: 8px 4px; font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      background: transparent; border: 1px solid var(--borde);
      color: var(--muted); cursor: pointer; transition: all 0.15s;
      text-align: center; min-width: 60px;
    }
    .esj-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--texto); }
    .esj-btn.active-sano    { border-color: var(--verde);    color: var(--verde);    background: rgba(46,204,113,0.1); }
    .esj-btn.active-herido  { border-color: var(--amarillo); color: var(--amarillo); background: rgba(243,156,18,0.1); }
    .esj-btn.active-grave   { border-color: var(--naranja);  color: var(--naranja);  background: rgba(230,126,34,0.1); }
    .esj-btn.active-critico { border-color: var(--rojo);     color: var(--rojo);     background: rgba(192,57,43,0.1); }
    .esj-btn.active-ko      { border-color: var(--muted);    color: var(--muted);    background: rgba(255,255,255,0.04); }

    /* Penalización info */
    .penalizacion-info {
      padding: 8px 12px; font-size: 12px;
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
    }
    .penalizacion-info i { font-size: 14px; }

    /* Inventario jugador */
    .inv-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--sup3);
      border: 1px solid var(--borde); margin-bottom: 6px;
      transition: border-color 0.15s;
    }
    .inv-item:hover { border-color: var(--borde-r); }
    .inv-item-icon { font-size: 18px; flex-shrink: 0; }
    .inv-item-info { flex: 1; }
    .inv-item-nombre {
      font-family: 'Cinzel', serif; font-size: 13px;
      font-weight: 600; color: var(--texto); margin-bottom: 2px;
    }
    .inv-item-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .inv-item-cant {
      font-family: 'Cinzel', serif; font-size: 16px;
      font-weight: 800; color: var(--dorado);
      min-width: 28px; text-align: center;
    }
    .inv-item-usar {
      width: 30px; height: 30px;
      background: transparent; border: 1px solid var(--borde-r);
      color: var(--rojo); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .inv-item-usar:hover { background: var(--rojo); color: white; }

    .inv-empty {
      text-align: center; padding: 24px;
      color: var(--muted); font-size: 13px; font-style: italic;
    }
    .inv-empty i { font-size: 24px; display: block; margin-bottom: 8px; opacity: 0.4; }

    /* Jenny display */
    .jenny-display {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; background: rgba(201,168,76,0.06);
      border: 1px solid var(--borde-d); margin-bottom: 14px;
    }
    .jenny-display i { font-size: 20px; color: var(--dorado); }
    .jenny-val {
      font-family: 'Cinzel', serif; font-size: 20px;
      font-weight: 800; color: var(--dorado);
    }
    .jenny-label { font-size: 11px; color: var(--muted); margin-left: 2px; }

    /* Dado animación */
    @keyframes dado-roll {
      0%   { transform: rotate(0deg) scale(1); }
      25%  { transform: rotate(15deg) scale(1.2); }
      50%  { transform: rotate(-10deg) scale(0.9); }
      75%  { transform: rotate(8deg) scale(1.1); }
      100% { transform: rotate(0deg) scale(1); }
    }
    .dado-anim { animation: dado-roll 0.4s ease; }
  </style>
</head>

<script type="module">
import { auth, db } from "../js/firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import {
  doc, getDoc, getDocs, addDoc, updateDoc, deleteDoc,
  collection, query, where, orderBy, onSnapshot,
  serverTimestamp, limit
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

// ═══════════════════════════════════
// ESTADO
// ═══════════════════════════════════
let ME = null;           // usuario actual
let MI_PERSONAJE = null; // ficha del usuario actual
let ES_DIRECTOR = false;
let CAMPANA_ID = null;
let CAMPANA_DATA = null;
let PERSONAJES_CAMPANA = [];
let drawColor = '#e74c3c';
let brushSize = 2;
let herramienta = 'lapiz';
let misLineas = [];      // líneas propias para borrado individual
let unsubChat = null;

const ATTRS_LABELS = {
  fuerza:'Fuerza', destreza:'Destreza', resistencia:'Resistencia',
  carisma:'Carisma', manipulacion:'Manipulación', compostura:'Compostura',
  percepcion:'Percepción', inteligencia:'Inteligencia', astucia:'Astucia'
};

const CRITERIOS_XP = [
  'Participó activamente en la sesión',
  'Interpretó correctamente a su personaje',
  'Tomó decisiones coherentes con su historia',
  'Aportó al grupo o a la misión',
  'Superó desafíos importantes',
  'Utilizó estrategias o ideas creativas',
  'Desarrolló conflictos o crecimiento narrativo',
  'Investigó, exploró o interactuó con el mundo',
];

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
const params = new URLSearchParams(window.location.search);
CAMPANA_ID = params.get('campana');
const ROL_PARAM = params.get('rol'); // 'director' | 'jugador'

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '../vistas/login.html'; return; }
  ME = user;

  if (!CAMPANA_ID) { toast('No se especificó campaña.', 'error'); return; }

  // Cargar campaña
  const campanaSnap = await getDoc(doc(db, 'campanas', CAMPANA_ID));
  if (!campanaSnap.exists()) { toast('Campaña no encontrada.', 'error'); return; }
  CAMPANA_DATA = { id: campanaSnap.id, ...campanaSnap.data() };
  document.getElementById('nav-campana-nombre').textContent = CAMPANA_DATA.nombre;

  // El rol lo determina el parámetro de URL, no el uid
  // Si no hay parámetro, fallback al uid para compatibilidad
  if (ROL_PARAM === 'director') {
    ES_DIRECTOR = true;
  } else if (ROL_PARAM === 'jugador') {
    ES_DIRECTOR = false;
  } else {
    ES_DIRECTOR = CAMPANA_DATA.directorId === ME.uid;
  }

  // Mostrar herramientas de DJ
  if (ES_DIRECTOR) {
    document.getElementById('btn-panel-dj').style.display = 'flex';
    document.getElementById('tool-borrar-todo').style.display = 'flex';
  }

  // Cargar mi personaje
  await cargarMiPersonaje();

  // Cargar personajes campaña
  await cargarPersonajesCampana();

  // Iniciar chat en tiempo real
  iniciarChat();

  // Iniciar canvas
  iniciarCanvas();

  // Cargar notas personales
  cargarNotasJugador();

  // Cargar susurro-select con jugadores
  poblarSusurroSelect();

  // Renderizar tab inicial del panel DJ
  if (ES_DIRECTOR) renderTab('jugadores');
});

// ═══════════════════════════════════
// PERSONAJES
// ═══════════════════════════════════
async function cargarMiPersonaje() {
  if (ES_DIRECTOR) return;
  const q = query(
    collection(db,'personajes'),
    where('userId','==',ME.uid),
    where('campanaId','==',CAMPANA_ID),
    limit(1)
  );
  const snap = await getDocs(q);
  if (!snap.empty) {
    MI_PERSONAJE = { id: snap.docs[0].id, ...snap.docs[0].data() };
  }
}

async function cargarPersonajesCampana() {
  const q = query(collection(db,'personajes'), where('campanaId','==',CAMPANA_ID));
  const snap = await getDocs(q);
  PERSONAJES_CAMPANA = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  renderizarAvatares();
}

function renderizarAvatares() {
  const wrap = document.getElementById('avatares-online');
  const lista = ES_DIRECTOR
    ? PERSONAJES_CAMPANA
    : PERSONAJES_CAMPANA;

  wrap.innerHTML = lista.map(p => {
    const estado = p.estadoSalud || 'sano';
    const inicial = (p.nombre||'?').charAt(0).toUpperCase();
    const pa = p.atributos ? (p.atributos.resistencia||1)+3 : '?';
    const esPropio = p.userId === ME.uid;
    const penMap = {sano:0, herido:-1, grave:-2, critico:-3, ko:-4};
    const pen = penMap[estado] || 0;
    const penHtml = pen < 0
      ? `<div class="avatar-penalty">${pen}</div>`
      : (estado === 'ko' ? `<div class="avatar-penalty">💀</div>` : '');
    const paActual = p.paActual !== undefined ? p.paActual : pa;
    return `
      <div class="avatar-pill" onclick="clickAvatar('${p.id}','${esPropio}')">
        <div style="position:relative;display:inline-block;">
          <div class="avatar-circle est-${estado}">${inicial}</div>
          ${penHtml}
        </div>
        <span class="avatar-nombre">${p.nombre?.split(' ')[0]||'?'}</span>
        <div class="avatar-tooltip">
          <strong>${p.nombre||'?'}</strong> · Nv.${p.nivel||1}<br>
          PA: ${paActual}/${pa} · ${estado.charAt(0).toUpperCase()+estado.slice(1)}<br>
          ${pen < 0 ? `Penalización: ${pen} a tiradas<br>` : ''}
          ${p.camino||'Sin camino'}
        </div>
      </div>`;
  }).join('');

  // Avatar del director
  if (ES_DIRECTOR) {
    const inicial = (ME.displayName||'D').charAt(0).toUpperCase();
    wrap.innerHTML = `
      <div class="avatar-pill">
        <div class="avatar-circle" style="border-color:var(--dorado);color:var(--dorado);">${inicial}</div>
        <span class="avatar-nombre" style="color:var(--dorado);">DJ</span>
        <div class="avatar-tooltip"><strong>${ME.displayName||'Director'}</strong><br>Director de Juego</div>
      </div>` + wrap.innerHTML;
  }
}

window.clickAvatar = function(personajeId, esPropio) {
  if (esPropio === 'true' || ES_DIRECTOR) {
    const p = PERSONAJES_CAMPANA.find(x => x.id === personajeId);
    if (p) abrirFichaPersonaje(p);
  }
};

function iniciarChat() {
  const q = query(
    collection(db,'campanas',CAMPANA_ID,'mensajes'),
    orderBy('timestamp','asc'),
    limit(100)
  );
  unsubChat = onSnapshot(q, snap => {
    const wrap = document.getElementById('chat-mensajes');
    wrap.innerHTML = '';
    snap.docs.forEach(d => {
      const msg = d.data();
      // Filtrar mensajes privados que no son para mí
      if (msg.tipo === 'privado' || msg.tipo === 'susurro') {
        const esParaMi = msg.paraId === ME.uid || msg.autorId === ME.uid;
        if (!esParaMi && !ES_DIRECTOR) return;
      }
      wrap.appendChild(renderMensaje(msg));
    });
    wrap.scrollTop = wrap.scrollHeight;
  });
}

function renderMensaje(msg) {
  const div = document.createElement('div');
  div.className = 'msg';
  const hora = msg.timestamp?.toDate
    ? msg.timestamp.toDate().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})
    : '';

  let contenido = '';
  let tipo = msg.tipo || 'general';

  if (tipo === 'tirada') {
    const total = msg.resultados?.reduce((a,b)=>a+b,0)||0;
    function simboloDado(n) {
      if (n === 1) return { sym: '1', col: '#e74c3c', glow: '0 0 6px #e74c3c55' };
      if (n <= 3)  return { sym: '✗', col: '#6b6673', glow: 'none' };
      if (n <= 5)  return { sym: '✓', col: '#e8e2d9', glow: 'none' };
      return           { sym: '6', col: '#2ecc71', glow: '0 0 6px #2ecc7155' };
    }
    const dadosHTML = (msg.resultados||[]).map(r => {
      const s = simboloDado(r);
      return '<span title="'+r+'" style="font-family:Cinzel,serif;font-size:14px;font-weight:800;color:'+s.col+';background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);padding:2px 7px;margin:2px;display:inline-block;box-shadow:'+s.glow+';">'+s.sym+'</span>';
    }).join('');
    contenido = '<div class="msg-tipo-badge">🎲 '+msg.cantidad+'d6 — Total: <strong style=\'color:var(--texto)\'>'
      +total+'</strong></div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:6px;">'+dadosHTML+'</div>';
  } else if (tipo === 'xp') {
    contenido = `⭐ <strong>${msg.paraName}</strong> recibió <strong>${msg.xp} XP</strong>${msg.motivo?` — ${msg.motivo}`:''}`;
  } else if (tipo === 'item') {
    contenido = `🎒 <strong>${msg.paraName}</strong> recibió: <strong>${msg.item}</strong>${msg.cantidad>1?` ×${msg.cantidad}`:''}`;
  } else if (tipo === 'dinero') {
    contenido = `💰 <strong>${msg.paraName}</strong> recibió <strong>${msg.cantidad} Jenny</strong>`;
  } else if (tipo === 'privado') {
    contenido = `🔒 <em>(Privado al DJ)</em> ${msg.texto}`;
  } else if (tipo === 'susurro') {
    contenido = `🔒 <em>(Susurro de DJ)</em> ${msg.texto}`;
  } else if (tipo === 'sistema') {
    contenido = msg.texto;
  } else {
    contenido = msg.texto;
  }

  div.innerHTML = `
    <div class="msg-header">
      <span class="msg-autor">${msg.autorNombre||'?'}</span>
      <span class="msg-hora">${hora}</span>
    </div>
    <div class="msg-body ${tipo}">${contenido}</div>`;
  return div;
}

function iniciarCanvas() {
  const canvas = document.getElementById('canvas-draw');
  const ctx = canvas.getContext('2d');
  let dibujando = false;

  // Ajustar tamaño sin borrar contenido usando offscreen
  function resize() {
    const w = canvas.parentElement.offsetWidth;
    const h = canvas.parentElement.offsetHeight;
    if (canvas.width === w && canvas.height === h) return;
    // Snapshot antes de redimensionar
    const tmp = document.createElement('canvas');
    tmp.width = canvas.width; tmp.height = canvas.height;
    tmp.getContext('2d').drawImage(canvas, 0, 0);
    canvas.width = w; canvas.height = h;
    ctx.drawImage(tmp, 0, 0);
  }

  // Esperar a que el DOM esté pintado para medir bien
  requestAnimationFrame(() => {
    resize();
    window.addEventListener('resize', resize);
  });

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top)  * scaleY
    };
  }

  canvas.addEventListener('pointerdown', e => {
    if (herramienta !== 'lapiz') return;
    dibujando = true;
    canvas.setPointerCapture(e.pointerId);
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    misLineas.push({ color:drawColor, size:brushSize, puntos:[[pos.x, pos.y]] });
  });

  canvas.addEventListener('pointermove', e => {
    if (!dibujando || herramienta !== 'lapiz') return;
    const pos = getPos(e);
    ctx.strokeStyle = drawColor;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    if (misLineas.length) {
      misLineas[misLineas.length-1].puntos.push([pos.x, pos.y]);
    }
  });

  canvas.addEventListener('pointerup',    () => { dibujando = false; ctx.beginPath(); });
  canvas.addEventListener('pointercancel',() => { dibujando = false; ctx.beginPath(); });
}

window.borrarPropios = function() {
  const canvas = document.getElementById('canvas-draw');

window.otorgarXP = async function() {
  const sel   = document.getElementById('xp-personaje');
  const pId   = sel.value;
  const pNom  = sel.options[sel.selectedIndex]?.dataset.nombre || '?';
  const xp    = criteriosCheck.filter(Boolean).length;

  if (xp === 0) { toast('Marca al menos un criterio.','error'); return; }

  const pSnap = await getDoc(pRef);
  if (!pSnap.exists()) return;
  const actual = pSnap.data().xpTotal || 0;
  await updateDoc(pRef, { xpTotal: actual + xp });

  await addDoc(collection(db,'campanas',CAMPANA_ID,'mensajes'), {
    autorId: ME.uid, autorNombre: (ME.displayName||'Director')+' [DJ]',
    tipo:'xp', paraId:pId, paraName:pNom, xp, motivo:nota,
    timestamp: serverTimestamp(),

  criteriosCheck = new Array(8).fill(false);
  toast(`✅ ${xp} XP otorgados a ${pNom}`, 'success');

  const pRef  = doc(db,'personajes',pId);
  const pSnap = await getDoc(pRef);
  const armas = pSnap.data().armas || [];
  armas.push({ nombre, desc, tipo:'arma' });
  await updateDoc(pRef, { armas });

  await addDoc(collection(db,'campanas',CAMPANA_ID,'mensajes'), {
    autorId:ME.uid, autorNombre:(ME.displayName||'Director')+' [DJ]',
    tipo:'item', paraId:pId, paraName:pNom, item:`⚔️ ${nombre}`, cantidad:1,
    timestamp:serverTimestamp(),
  });
  toast(`⚔️ ${nombre} entregada a ${pNom}`, 'success');
};

window.entregarDinero = async function() {
  const sel   = document.getElementById('inv-personaje');
  const pId   = sel.value;
  const pNom  = sel.options[sel.selectedIndex]?.dataset.nombre||'?';
  const jenny = parseInt(document.getElementById('inv-jenny').value)||0;
  if (jenny <= 0) { toast('Ingresa una cantidad válida.','error'); return; }

  const pRef  = doc(db,'personajes',pId);
  const pSnap = await getDoc(pRef);
  const actual = pSnap.data().dinero || 0;
  await updateDoc(pRef, { dinero: actual + jenny });

  await addDoc(collection(db,'campanas',CAMPANA_ID,'mensajes'), {
    autorId:ME.uid, autorNombre:(ME.displayName||'Director')+' [DJ]',
    tipo:'dinero', paraId:pId, paraName:pNom, cantidad:jenny,
    timestamp:serverTimestamp(),
  });
  toast(`💰 ${jenny} Jenny entregados a ${pNom}`, 'success');
};

window.enviarSusurro = async function() {
  const sel    = document.getElementById('sus-target-sel');
  const paraId = sel.value;
  const paraNom= sel.options[sel.selectedIndex]?.dataset.nombre||'?';
  const texto  = document.getElementById('sus-mensaje').value.trim();
  if (!texto) { toast('Escribe un mensaje.','error'); return; }

  await addDoc(collection(db,'campanas',CAMPANA_ID,'mensajes'), {
    autorId:ME.uid, autorNombre:(ME.displayName||'Director')+' [DJ]',
    tipo:'susurro', paraId, paraNombre:paraNom, texto,
    timestamp:serverTimestamp(),
  });
  document.getElementById('sus-mensaje').value = '';
  toast(`🔒 Susurro enviado a ${paraNom}`, 'success');
};

window.cambiarEstado = async function(personajeId, nuevoEstado, btn) {
  await updateDoc(doc(db,'personajes',personajeId), { estadoSalud: nuevoEstado });
  const card = btn.closest('.jugador-ficha-card');
  card.querySelectorAll('.est-btn').forEach(b => {
    b.className = 'est-btn';
    const e = b.textContent.trim().toLowerCase();
    if (e === nuevoEstado) b.classList.add(`active-${nuevoEstado}`);
  });
  await cargarPersonajesCampana();
  toast(`Estado actualizado: ${nuevoEstado}`, 'success');
};

// Mapa
window.cambiarMapa = function(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('mapa-bg').style.backgroundImage = `url(${e.target.result})`;
    toast('Mapa actualizado.', 'success');
  };
  reader.readAsDataURL(input.files[0]);
};

window.resetMapa = function() {
  document.getElementById('mapa-bg').style.backgroundImage = "url('../imagenes/mapa.png')";
  toast('Mapa restaurado.', 'info');
};

// Notas
window.guardarNotasDJ = function() {
  const val = document.getElementById('notas-dj-area')?.value || '';
  localStorage.setItem(`notas-dj-${CAMPANA_ID}`, val);
};

function cargarNotasJugador() {

window.guardarNotasJugador = function() {

};

// ═══════════════════════════════════
// MODALES
// ═══════════════════════════════════
window.abrirFicha = function() {
  if (MI_PERSONAJE) {
    abrirFichaPersonaje(MI_PERSONAJE);
  } else if (ES_DIRECTOR) {
    toast('Selecciona un personaje desde el Panel DJ.','info');
  } else {
    toast('No tienes un personaje en esta campaña.','error');
  }
};

window.abrirFichaPersonaje = function(p) {
  if (typeof p === 'string') p = JSON.parse(p);
  const esPropia = !ES_DIRECTOR && MI_PERSONAJE && MI_PERSONAJE.id === p.id;
  document.getElementById('modal-ficha-titulo').textContent = p.nombre || 'Ficha';

  const paMax   = p.atributos ? (p.atributos.resistencia||1)+3 : 4;
  const paActual = p.paActual !== undefined ? p.paActual : paMax;
  const init    = p.atributos ? (p.atributos.percepcion||1)+(p.habilidades?.['Alerta']||0) : 1;
  const estado  = p.estadoSalud || 'sano';

  const penMap  = {sano:0, herido:-1, grave:-2, critico:-3, ko:-4};
  const pen     = penMap[estado] || 0;
  const penColores = {sano:'var(--verde)',herido:'var(--amarillo)',grave:'var(--naranja)',critico:'var(--rojo)',ko:'var(--muted)'};
  const penColor = penColores[estado] || 'var(--muted)';

  const attrsHTML = Object.entries(p.atributosEfectivos||p.atributos||{}).map(([k,v]) =>
    `<div class="ficha-attr"><span class="ficha-attr-val">${v}</span><span class="ficha-attr-lbl">${ATTRS_LABELS[k]||k}</span></div>`
  ).join('');

  const skillsHTML = Object.entries(p.habilidadesEfectivas||p.habilidades||{})
    .filter(([,v])=>v>0)
    .map(([k,v]) => `<div class="ficha-skill-row"><span class="ficha-skill-nombre">${k}</span><span class="ficha-skill-val">${v}</span></div>`)
    .join('');

  // Tab: Estado + PA
  const tabEstado = `
    <div class="ficha-tab-body active" id="ftab-estado">
      <div class="ficha-seccion-titulo">Estado de Salud</div>
      ${pen < 0 ? `
        <div class="penalizacion-info" style="background:rgba(192,57,43,0.06);border:1px solid ${penColor}33;color:${penColor};border-radius:2px;">
          <i class="ri-alert-line"></i>
          <span>Penalización activa: <strong>${pen}</strong> a todas las tiradas</span>
        </div>` : `
        <div class="penalizacion-info" style="background:rgba(46,204,113,0.06);border:1px solid rgba(46,204,113,0.2);color:var(--verde);border-radius:2px;">
          <i class="ri-checkbox-circle-line"></i> <span>Sin penalizaciones</span>
        </div>`}
      ${esPropia ? `
        <div class="estado-jugador-selector">
          ${['sano','herido','grave','critico','ko'].map(e =>
            `<button class="esj-btn ${estado===e?'active-'+e:''}"
              onclick="jugadorCambiarEstado('${p.id}','${e}')">${e==='ko'?'💀 KO':e.charAt(0).toUpperCase()+e.slice(1)}</button>`
          ).join('')}
        </div>` : `
        <div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:12px;">
          Solo el jugador puede cambiar su propio estado.
        </div>`}

      <div class="ficha-seccion-titulo" style="margin-top:16px;">Puntos de Aguante</div>
      <div class="pa-control">
        <span class="pa-label">PA Actual</span>
        ${esPropia ? `
          <button class="pa-btn" onclick="jugadorCambiarPA('${p.id}', ${paActual}, ${paMax}, -1)">−</button>
          <span class="pa-val" id="pa-display-${p.id}">${paActual}</span>
          <button class="pa-btn" onclick="jugadorCambiarPA('${p.id}', ${paActual}, ${paMax}, 1)">+</button>` : `
          <span class="pa-val">${paActual}</span>`}
        <span class="pa-max">/ ${paMax}</span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;">
        <div style="background:var(--sup3);padding:10px;text-align:center;">
          <span style="font-family:'Cinzel',serif;font-size:20px;font-weight:800;color:var(--texto);display:block;">${init}</span>
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);">Iniciativa</span>
        </div>
        <div style="background:var(--sup3);padding:10px;text-align:center;">
          <span style="font-family:'Cinzel',serif;font-size:20px;font-weight:800;color:var(--dorado);display:block;">${p.xpTotal||0}</span>
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);">XP Total</span>
        </div>
      </div>
    </div>`;

  // Tab: Stats
  const tabStats = `
    <div class="ficha-tab-body" id="ftab-stats">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
        <span style="font-size:12px;color:var(--muted);">Cultura: <strong style="color:var(--texto);">${p.cultura||'—'}${p.linaje?' · '+p.linaje:''}</strong></span>
        <span style="font-size:12px;color:var(--muted);">Camino: <strong style="color:var(--texto);">${p.camino||'—'}</strong></span>
        <span style="font-size:12px;color:var(--muted);">Nv: <strong style="color:var(--dorado);">${p.nivel||1}</strong></span>
      </div>
      ${attrsHTML ? `<div class="ficha-seccion-titulo">Atributos</div><div class="ficha-attrs" style="margin-bottom:14px;">${attrsHTML}</div>` : ''}
      ${skillsHTML ? `<div class="ficha-seccion-titulo">Habilidades</div><div class="ficha-skills-grid">${skillsHTML}</div>` : ''}
      ${p.habilidadCultura ? `
        <div class="ficha-seccion-titulo" style="margin-top:14px;">Habilidad de Cultura</div>
        <div style="background:rgba(192,57,43,0.05);border:1px solid var(--borde-r);border-left:3px solid var(--rojo);padding:12px;">
          <strong style="font-family:'Cinzel',serif;font-size:13px;color:var(--texto);display:block;margin-bottom:4px;">${p.habilidadCultura.name}</strong>
          <span style="font-size:12px;color:var(--sec);line-height:1.6;">${p.habilidadCultura.desc}</span>
        </div>` : ''}
    </div>`;

  // Tab: Inventario
  const objetos  = p.objetos  || [];
  const armas    = p.armas    || [];
  const dinero   = p.dinero   || 0;

  const itemsHTML = [
    ...armas.map((a,i) => `
      <div class="inv-item" id="inv-arma-${i}">
        <span class="inv-item-icon">⚔️</span>
        <div class="inv-item-info">
          <div class="inv-item-nombre">${a.nombre}</div>
          ${a.desc ? `<div class="inv-item-desc">${a.desc}</div>` : ''}
        </div>
        <span class="inv-item-cant">—</span>
        ${esPropia ? `<button class="inv-item-usar" title="Descartar" onclick="jugadorDescartarArma('${p.id}',${i})"><i class="ri-delete-bin-line"></i></button>` : ''}
      </div>`),
    ...objetos.map((o,i) => `
      <div class="inv-item" id="inv-obj-${i}">
        <span class="inv-item-icon">🎒</span>
        <div class="inv-item-info">
          <div class="inv-item-nombre">${o.nombre}</div>
          ${o.desc ? `<div class="inv-item-desc">${o.desc}</div>` : ''}
        </div>
        <span class="inv-item-cant" id="inv-cant-${i}">${o.cantidad||1}</span>
        ${esPropia ? `<button class="inv-item-usar" title="Usar/Restar uno" onclick="jugadorUsarObjeto('${p.id}',${i})"><i class="ri-subtract-line"></i></button>` : ''}
      </div>`)
  ].join('');

  const tabInv = `
    <div class="ficha-tab-body" id="ftab-inv">
      <div class="jenny-display">
        <i class="ri-money-dollar-circle-line"></i>
        <span class="jenny-val">${dinero}</span>
        <span class="jenny-label">Jenny</span>
      </div>
      ${itemsHTML || `<div class="inv-empty"><i class="ri-inbox-line"></i>Sin objetos todavía.</div>`}
    </div>`;

  // Tab: Objetivo
  const tabObj = `
    <div class="ficha-tab-body" id="ftab-obj">
      ${p.objetivoActual ? `
        <div class="ficha-seccion-titulo">Objetivo Actual</div>
        <p style="font-size:13px;color:var(--sec);font-style:italic;line-height:1.7;margin-bottom:16px;">${p.objetivoActual}</p>` : ''}
      ${p.objetivoVida ? `
        <div class="ficha-seccion-titulo">Objetivo de Vida</div>
        <p style="font-size:13px;color:var(--sec);font-style:italic;line-height:1.7;">${p.objetivoVida}</p>` : ''}
      ${p.equipo ? `
        <div class="ficha-seccion-titulo" style="margin-top:14px;">Equipo Inicial</div>
        <p style="font-size:13px;color:var(--sec);line-height:1.7;">${p.equipo}</p>` : ''}
    </div>`;

  document.getElementById('modal-ficha-body').innerHTML = `
    <div class="ficha-tabs">
      <button class="ficha-tab active" onclick="switchFichaTab('estado',this)">Estado</button>
      <button class="ficha-tab" onclick="switchFichaTab('stats',this)">Stats</button>
      <button class="ficha-tab" onclick="switchFichaTab('inv',this)">Inventario</button>
      <button class="ficha-tab" onclick="switchFichaTab('obj',this)">Objetivos</button>
    </div>
    ${tabEstado}${tabStats}${tabInv}${tabObj}`;

  document.getElementById('modal-ficha').classList.add('open');
};

window.switchFichaTab = function(tab, el) {
  document.querySelectorAll('.ficha-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.ficha-tab-body').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('ftab-'+tab)?.classList.add('active');
};

window.jugadorCambiarEstado = async function(personajeId, nuevoEstado) {
  await updateDoc(doc(db,'personajes',personajeId), { estadoSalud: nuevoEstado });
  // Actualizar UI del modal
  document.querySelectorAll('.esj-btn').forEach(b => {
    b.className = 'esj-btn';
    const e = b.textContent.replace('💀 ','').trim().toLowerCase();
    if (e === nuevoEstado) b.classList.add('active-'+nuevoEstado);
  });
  // Actualizar penalización visual
  const penMap = {sano:0,herido:-1,grave:-2,critico:-3,ko:-4};
  const pen = penMap[nuevoEstado] || 0;
  // Recargar avatares
  await cargarPersonajesCampana();
  if (MI_PERSONAJE) MI_PERSONAJE.estadoSalud = nuevoEstado;
  toast('Estado actualizado: '+nuevoEstado, 'success');
};

window.jugadorCambiarPA = async function(personajeId, actual, maximo, delta) {
  const nuevo = Math.max(0, Math.min(maximo, actual + delta));
  await updateDoc(doc(db,'personajes',personajeId), { paActual: nuevo });
  const el = document.getElementById('pa-display-'+personajeId);
  if (el) el.textContent = nuevo;
  // Actualizar botones con nuevo valor
  const btns = document.querySelectorAll('.pa-btn');
  if (btns[0]) btns[0].setAttribute('onclick', `jugadorCambiarPA('${personajeId}',${nuevo},${maximo},-1)`);
  if (btns[1]) btns[1].setAttribute('onclick', `jugadorCambiarPA('${personajeId}',${nuevo},${maximo},1)`);
  if (MI_PERSONAJE) MI_PERSONAJE.paActual = nuevo;
  await cargarPersonajesCampana();
};

window.jugadorUsarObjeto = async function(personajeId, idx) {
  const pRef  = doc(db,'personajes',personajeId);
  const pSnap = await getDoc(pRef);
  const objetos = [...(pSnap.data().objetos||[])];
  if (!objetos[idx]) return;
  objetos[idx].cantidad = (objetos[idx].cantidad||1) - 1;
  const nombreObj = objetos[idx].nombre;
  if (objetos[idx].cantidad <= 0) {
    objetos.splice(idx, 1);
    toast(`${nombreObj} agotado y eliminado del inventario.`, 'info');
  } else {
    toast(`${nombreObj} usado. Quedan ${objetos[idx].cantidad}.`, 'success');
  }
  await updateDoc(pRef, { objetos });
  // Notificar en chat
  const autorNombre = MI_PERSONAJE?.nombre || ME.displayName || 'Cazador';
  await addDoc(collection(db,'campanas',CAMPANA_ID,'mensajes'), {
    autorId:ME.uid, autorNombre, tipo:'sistema',
    texto:`🎒 ${autorNombre} usó ${nombreObj}.`,
    timestamp:serverTimestamp(),
  });
  if (MI_PERSONAJE) MI_PERSONAJE.objetos = objetos;
  // Refrescar ficha
  const pData = { ...pSnap.data(), objetos, id:personajeId };
  abrirFichaPersonaje(pData);
};

window.jugadorDescartarArma = async function(personajeId, idx) {
  const pRef  = doc(db,'personajes',personajeId);
  const pSnap = await getDoc(pRef);
  const armas = [...(pSnap.data().armas||[])];
  const nombreArma = armas[idx]?.nombre || 'Arma';
  armas.splice(idx, 1);
  await updateDoc(pRef, { armas });
  toast(`${nombreArma} descartada.`, 'info');
  if (MI_PERSONAJE) MI_PERSONAJE.armas = armas;
  const pData = { ...pSnap.data(), armas, id:personajeId };
  abrirFichaPersonaje(pData);
};

window.abrirNotas = function() {
  document.getElementById('modal-notas').classList.add('open');
};

window.cerrarModal = function(id) {
  document.getElementById(id).classList.remove('open');
};

window.cerrarModalFuera = function(e, id) {
  if (e.target.id === id) cerrarModal(id);
};

// ═══════════════════════════════════
// TOAST
// ═══════════════════════════════════
function toast(msg, tipo) {
  const t = document.getElementById('toast');
  const cfg = {
    success: { bg:'rgba(26,74,46,0.95)', border:'#2d7a4a', color:'#7ad49a' },
    error:   { bg:'rgba(80,19,19,0.95)', border:'#e74c3c', color:'#ff8080' },
    info:    { bg:'rgba(14,18,24,0.95)', border:'var(--dorado)', color:'var(--dorado)' },
  }[tipo] || { bg:'rgba(14,18,24,0.95)', border:'var(--borde-d)', color:'var(--sec)' };
  Object.assign(t.style, { background:cfg.bg, borderColor:cfg.border, color:cfg.color, opacity:'1' });
  t.textContent = msg;
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.opacity = '0'; }, 3500);
}
window.toast = toast;
</script>
