<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Crónicas del Cazador</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --rojo: #c0392b;
            --rojo-glow: rgba(192,57,43,0.35);
            --negro: #07070a;
            --sup2: #16161e;
            --borde: rgba(255,255,255,0.07);
            --borde-r: rgba(192,57,43,0.35);
            --texto: #e8e2d9;
            --muted: #8a8490;
            --sec: #b0aab8;
            --dorado: #c9a84c;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Raleway', sans-serif;
            background: var(--negro);
            color: var(--texto);
            min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(192,57,43,0.08) 0%, transparent 65%),
                radial-gradient(ellipse 50% 60% at 80% 90%, rgba(192,57,43,0.05) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }

        /* ── NAVBAR ── */
        .navbar {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; height: 64px;
            border-bottom: 1px solid var(--borde);
            background: rgba(7,7,10,0.8);
            backdrop-filter: blur(12px);
        }

        .logo {
            display: flex; align-items: center;
            text-decoration: none;
        }

        .logo img {
            height: 36px; width: auto;
            filter: invert(1) brightness(0.85);
            mix-blend-mode: screen;
        }

        .nav-login-link {
            font-size: 12px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--muted); text-decoration: none;
            display: flex; align-items: center; gap: 6px;
            transition: color 0.2s;
        }

        .nav-login-link:hover { color: var(--texto); }

        /* ── MAIN ── */
        main {
            position: relative; z-index: 1;
            flex: 1; display: flex;
            align-items: center; justify-content: center;
            padding: 40px 20px;
        }

        .card {
            width: 100%; max-width: 440px;
            background: var(--sup2);
            border: 1px solid var(--borde);
            border-top: 2px solid var(--rojo);
            padding: 40px 40px 36px;
        }

        /* Header */
        .card-header { text-align: center; margin-bottom: 32px; }

        .card-eyebrow {
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.3em; text-transform: uppercase;
            color: var(--rojo); margin-bottom: 10px;
        }

        .card-titulo {
            font-family: 'Cinzel', serif;
            font-size: 26px; font-weight: 800;
            color: var(--texto); line-height: 1.1;
            margin-bottom: 8px;
        }

        .card-subtitulo {
            font-size: 13px; color: var(--muted); line-height: 1.6;
        }

        /* Divisor */
        .divisor {
            width: 40px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--rojo), transparent);
            margin: 0 auto 28px;
        }

        /* Form */
        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block; font-size: 11px; font-weight: 600;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 8px;
        }

        .form-input {
            width: 100%; height: 44px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--borde);
            color: var(--texto);
            font-family: 'Raleway', sans-serif;
            font-size: 14px; font-weight: 500;
            padding: 0 14px;
            transition: border-color 0.2s, background 0.2s;
            outline: none;
        }

        .form-input::placeholder { color: rgba(138,132,144,0.5); }

        .form-input:focus {
            border-color: var(--borde-r);
            background: rgba(192,57,43,0.04);
        }

        .form-hint {
            font-size: 11px; color: var(--muted);
            margin-top: 5px; line-height: 1.4;
        }

        /* ── CHECKBOX TOS ── */
        .tos-group {
            display: flex; align-items: flex-start; gap: 10px;
            margin-top: 20px; padding: 14px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--borde);
        }

        .tos-checkbox {
            appearance: none; -webkit-appearance: none;
            width: 18px; height: 18px; min-width: 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer; margin-top: 1px;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }

        .tos-checkbox:checked {
            background: var(--rojo);
            border-color: var(--rojo);
        }

        .tos-checkbox:checked::after {
            content: '';
            position: absolute;
            width: 5px; height: 9px;
            border: 2px solid white;
            border-top: none; border-left: none;
            transform: rotate(45deg) translateY(-1px);
        }

        .tos-checkbox:focus { outline: none; border-color: var(--rojo); }

        .tos-label {
            font-size: 12px; color: var(--muted);
            line-height: 1.5; cursor: pointer;
        }

        .tos-label a {
            color: var(--rojo); text-decoration: none;
            font-weight: 600; transition: color 0.2s;
        }

        .tos-label a:hover { color: #e74c3c; }

        /* Botón */
        .btn-submit {
            width: 100%; height: 46px;
            background: var(--rojo); border: none;
            color: white; font-family: 'Cinzel', serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: 0.15em; text-transform: uppercase;
            cursor: pointer; margin-top: 16px;
            transition: background 0.2s, transform 0.15s;
            box-shadow: 0 4px 16px rgba(192,57,43,0.3);
        }

        .btn-submit:hover:not(:disabled) {
            background: #e74c3c; transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.4; cursor: not-allowed; transform: none;
        }

        /* Footer del form */
        .form-footer {
            text-align: center; margin-top: 20px;
            font-size: 13px; color: var(--muted);
        }

        .form-footer a {
            color: var(--rojo); text-decoration: none;
            font-weight: 600; transition: color 0.2s;
        }

        .form-footer a:hover { color: #e74c3c; }

        /* Input icono wrapper */
        .input-wrapper { position: relative; }

        .input-wrapper i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            font-size: 16px; color: var(--muted);
            pointer-events: none; transition: color 0.2s;
        }

        .input-wrapper .form-input { padding-left: 40px; }

        .input-wrapper:focus-within i { color: var(--rojo); }

        /* Toggle password */
        .toggle-pass {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: transparent; border: none;
            color: var(--muted); cursor: pointer;
            font-size: 16px; padding: 4px;
            transition: color 0.2s;
        }

        .toggle-pass:hover { color: var(--texto); }

        /* Quote decorativa */
        .card-quote {
            text-align: center; margin-top: 28px;
            padding-top: 20px; border-top: 1px solid var(--borde);
            font-size: 11px; font-style: italic;
            color: rgba(201,168,76,0.5);
            line-height: 1.6;
        }


    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="../index.html" class="logo">
            <img src="../imagenes/logo.png" alt="Crónicas del Cazador">
        </a>
        <a href="login.html" class="nav-login-link">
            <i class="ri-arrow-left-line"></i> Volver al login
        </a>
    </nav>

    <!-- Main -->
    <main>
        <div class="card">
            <div class="card-header">
                <p class="card-eyebrow">Únete a la cacería</p>
                <h1 class="card-titulo">Crear Cuenta</h1>
                <p class="card-subtitulo">Tu historia en el mundo de los Cazadores está a punto de comenzar.</p>
            </div>

            <div class="divisor"></div>

            <form id="registro-form">

                <div class="form-group">
                    <label class="form-label" for="username">Nombre de Cazador</label>
                    <div class="input-wrapper">
                        <i class="ri-user-line"></i>
                        <input class="form-input" type="text" id="username"
                               placeholder="Tu alias en el mundo" autocomplete="username" required>
                    </div>
                    <p class="form-hint">Este nombre aparecerá en tu perfil y personajes.</p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="ri-mail-line"></i>
                        <input class="form-input" type="email" id="email"
                               placeholder="tu@correo.com" autocomplete="email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="ri-lock-line"></i>
                        <input class="form-input" type="password" id="password"
                               placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
                        <button type="button" class="toggle-pass" onclick="togglePassword()">
                            <i class="ri-eye-line" id="toggle-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- ── CHECKBOX TOS ── -->
                <div class="tos-group">
                    <input type="checkbox" class="tos-checkbox" id="acepto-tos">
                    <label class="tos-label" for="acepto-tos">
                        Declaro que he leído y acepto los
                        <a href="../terminos.html" target="_blank">Términos de Servicio y Política de Propiedad Intelectual</a>
                        de Crónicas del Cazador.
                    </label>
                </div>

                <button type="submit" class="btn-submit" id="btn-crear" disabled>
                    <i class="ri-quill-pen-line"></i> Crear cuenta
                </button>

            </form>

            <p class="form-footer">
                ¿Ya eres un cazador? <a href="login.html">Inicia sesión</a>
            </p>

            <p class="card-quote">"El mundo no cambia por los personajes… son los personajes quienes deben adaptarse a él."</p>
        </div>
    </main>


    <script>
        // Toggle password
        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'ri-eye-off-line';
            } else {
                input.type = 'password';
                icon.className = 'ri-eye-line';
            }
        }

        // Checkbox habilita/deshabilita botón
        const checkbox = document.getElementById('acepto-tos');
        const btnCrear = document.getElementById('btn-crear');

        checkbox.addEventListener('change', () => {
            btnCrear.disabled = !checkbox.checked;
        });
    </script>

    <script type="module" src="../js/auth.js"></script>

</body>
</html>
