<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Personajes | Crónicas del Cazador</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --rojo: #c0392b;
            --rojo-hover: #e74c3c;
            --rojo-glow: rgba(192, 57, 43, 0.3);
            --negro: #0a0a0c;
            --superficie: #111117;
            --superficie-2: #16161e;
            --superficie-3: #1e1e28;
            --borde: rgba(255,255,255,0.07);
            --borde-rojo: rgba(192, 57, 43, 0.4);
            --texto: #e8e2d9;
            --texto-muted: #8a8490;
            --texto-secundario: #b0aab8;
            --dorado: #c9a84c;
            --verde: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: var(--negro);
            color: var(--texto);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 50% 40% at 15% 0%, rgba(192,57,43,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 50% at 85% 100%, rgba(192,57,43,0.04) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* ── NAVBAR ── */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; gap: 8px;
            padding: 0 32px; height: 60px;
            background: rgba(10,10,12,0.92);
            border-bottom: 1px solid var(--borde);
            backdrop-filter: blur(12px);
        }

        .logo {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; margin-right: 16px; flex-shrink: 0;
        }

        .logo-mark {
            width: 34px; height: 34px;
            border: 1.5px solid var(--rojo);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .logo-mark::before {
            content: ''; position: absolute; inset: 3px;
            border: 1px solid rgba(192,57,43,0.3);
        }

        .logo-text-main {
            font-family: 'Cinzel', serif; font-size: 13px; font-weight: 800;
            letter-spacing: 0.12em; color: var(--texto); line-height: 1.1;
        }

        .logo-text-sub {
            font-family: 'Cinzel', serif; font-size: 9px; font-weight: 400;
            letter-spacing: 0.2em; color: var(--rojo);
        }

        .nav-items { display: flex; align-items: center; gap: 2px; flex: 1; }

        .nav-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 0 14px; height: 60px;
            background: transparent; border: none;
            color: var(--texto-secundario);
            font-family: 'Raleway', sans-serif;
            font-size: 12px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; transition: color 0.2s;
            white-space: nowrap; text-decoration: none;
        }

        .nav-btn:hover { color: var(--texto); }
        .nav-btn i { font-size: 14px; }

        .nav-dropdown { position: relative; display: flex; align-items: center; height: 60px; }

        .nav-dropdown-trigger {
            display: flex; align-items: center; gap: 6px;
            padding: 0 14px; height: 60px;
            background: transparent; border: none;
            color: var(--texto-secundario);
            font-family: 'Raleway', sans-serif;
            font-size: 12px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; transition: color 0.2s;
            white-space: nowrap; user-select: none;
        }

        .nav-dropdown-trigger i { font-size: 14px; }
        .nav-dropdown-trigger .chevron { font-size: 13px; transition: transform 0.22s; margin-left: 2px; }
        .nav-dropdown:hover .nav-dropdown-trigger { color: var(--texto); }
        .nav-dropdown:hover .chevron { transform: rotate(180deg); }

        .dropdown-menu {
            display: none;
            position: absolute; top: 100%; left: 0;
            min-width: 210px; background: var(--superficie-2);
            border: 1px solid rgba(255,255,255,0.09);
            border-top: 2px solid var(--rojo);
            padding: 6px 0; z-index: 999;
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
        }

        .nav-dropdown:hover .dropdown-menu { display: block; }

        .dropdown-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; color: var(--texto-secundario);
            font-size: 12px; font-weight: 500;
            letter-spacing: 0.05em; text-transform: uppercase;
            cursor: pointer; transition: background 0.15s, color 0.15s;
            border: none; background: transparent;
            width: 100%; text-align: left;
            font-family: 'Raleway', sans-serif;
        }

        .dropdown-item:hover { background: rgba(192,57,43,0.1); color: var(--texto); }
        .dropdown-item i { font-size: 15px; color: var(--rojo); flex-shrink: 0; }
        .dropdown-sep { height: 1px; background: var(--borde); margin: 4px 0; }

        .nav-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }

        .nav-user { font-size: 12px; font-weight: 500; color: var(--texto-muted); letter-spacing: 0.05em; }
        .nav-user span { color: var(--dorado); font-weight: 600; }

        .btn-logout {
            display: flex; align-items: center; gap: 6px;
            padding: 0 14px; height: 32px;
            background: transparent; border: 1px solid rgba(192,57,43,0.4);
            color: var(--rojo); font-family: 'Raleway', sans-serif;
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; transition: background 0.2s, color 0.2s;
        }

        .btn-logout:hover { background: var(--rojo); color: white; }

        /* ── MAIN ── */
        main {
            position: relative; z-index: 1;
            max-width: 1000px; margin: 0 auto;
            padding: 52px 32px 80px;
        }

        /* Header de página */
        .page-header {
            display: flex; align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--borde);
        }

        .page-header-left {}

        .page-eyebrow {
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.25em; text-transform: uppercase;
            color: var(--rojo); margin-bottom: 8px;
        }

        .page-titulo {
            font-family: 'Cinzel', serif;
            font-size: clamp(22px, 4vw, 34px);
            font-weight: 800; color: var(--texto);
            line-height: 1.1;
        }

        .page-contador {
            font-size: 13px; color: var(--texto-muted);
            margin-top: 6px;
        }

        .page-contador span { color: var(--dorado); font-weight: 600; }

        /* Botón crear */
        .btn-crear {
            display: flex; align-items: center; gap: 8px;
            padding: 0 22px; height: 42px;
            background: var(--rojo); border: none;
            color: white; font-family: 'Cinzel', serif;
            font-size: 12px; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            cursor: pointer; transition: background 0.2s, transform 0.15s;
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(192,57,43,0.3);
        }

        .btn-crear:hover { background: var(--rojo-hover); transform: translateY(-1px); }

        .btn-crear.disabled {
            background: var(--superficie-2);
            border: 1px solid var(--borde);
            color: var(--texto-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Barra de slots */
        .slots-bar {
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 32px;
        }

        .slot {
            width: 32px; height: 4px;
            background: var(--superficie-3);
            border-radius: 2px;
            transition: background 0.3s;
        }

        .slot.ocupado { background: var(--rojo); }
        .slot.proximo { background: rgba(192,57,43,0.25); }

        .slots-label {
            font-size: 11px; color: var(--texto-muted);
            letter-spacing: 0.05em; margin-left: 6px;
        }

        /* Grid de personajes */
        .grid-personajes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* Tarjeta de personaje */
        .tarjeta {
            background: var(--superficie-2);
            border: 1px solid var(--borde);
            position: relative;
            transition: border-color 0.2s, transform 0.2s;
            cursor: pointer;
            overflow: hidden;
        }

        .tarjeta::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px; background: var(--rojo);
            transform: scaleX(0);
            transition: transform 0.25s;
            transform-origin: left;
        }

        .tarjeta:hover { border-color: var(--borde-rojo); transform: translateY(-3px); }
        .tarjeta:hover::before { transform: scaleX(1); }

        .tarjeta-avatar {
            width: 100%; height: 140px;
            background: var(--superficie-3);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        .tarjeta-avatar img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: top;
            opacity: 0.85;
        }

        .tarjeta-avatar-placeholder {
            font-size: 48px; color: rgba(192,57,43,0.15);
        }

        .tarjeta-nivel {
            position: absolute; bottom: 8px; right: 8px;
            background: var(--rojo);
            color: white; font-family: 'Cinzel', serif;
            font-size: 12px; font-weight: 800;
            padding: 3px 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .tarjeta-body { padding: 16px 18px 18px; }

        .tarjeta-nombre {
            font-family: 'Cinzel', serif;
            font-size: 16px; font-weight: 700;
            color: var(--texto); margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .tarjeta-cultura {
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--rojo); margin-bottom: 10px;
        }

        .tarjeta-meta {
            display: flex; gap: 8px;
            flex-wrap: wrap; margin-bottom: 14px;
        }

        .meta-pill {
            display: flex; align-items: center; gap: 5px;
            padding: 3px 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--borde);
            font-size: 11px; color: var(--texto-muted);
        }

        .meta-pill i { font-size: 12px; color: var(--texto-muted); }

        /* Estado de salud badge */
        .estado-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; font-size: 10px; font-weight: 700;
            letter-spacing: 0.08em; text-transform: uppercase;
            border: 1px solid; margin-bottom: 14px;
        }

        .estado-sano    { color: var(--verde);   border-color: rgba(46,204,113,0.3);  background: rgba(46,204,113,0.06); }
        .estado-herido  { color: #f1c40f;         border-color: rgba(241,196,15,0.3);  background: rgba(241,196,15,0.06); }
        .estado-grave   { color: #e67e22;         border-color: rgba(230,126,34,0.3);  background: rgba(230,126,34,0.06); }
        .estado-critico { color: var(--rojo);     border-color: var(--borde-rojo);     background: rgba(192,57,43,0.06); }
        .estado-ko      { color: var(--texto-muted); border-color: var(--borde);       background: rgba(255,255,255,0.02); }

        /* Acciones */
        .tarjeta-acciones {
            display: flex; gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--borde);
        }

        .btn-ver {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 8px; background: rgba(192,57,43,0.08);
            border: 1px solid var(--borde-rojo);
            color: var(--rojo); font-family: 'Raleway', sans-serif;
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; transition: background 0.15s, color 0.15s;
            text-decoration: none;
        }

        .btn-ver:hover { background: var(--rojo); color: white; }

        .btn-eliminar {
            display: flex; align-items: center; justify-content: center;
            width: 34px; height: 34px;
            background: transparent; border: 1px solid var(--borde);
            color: var(--texto-muted); cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
            font-size: 15px;
        }

        .btn-eliminar:hover { border-color: rgba(231,76,60,0.5); color: #e74c3c; }

        /* Tarjeta vacía (slot disponible) */
        .tarjeta-vacia {
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.08);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 220px; padding: 24px;
            cursor: default;
        }

        .tarjeta-vacia i {
            font-size: 28px; color: rgba(255,255,255,0.08);
            margin-bottom: 8px;
        }

        .tarjeta-vacia span {
            font-size: 11px; color: rgba(255,255,255,0.12);
            letter-spacing: 0.08em; text-transform: uppercase;
        }

        /* Estado vacío total */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center; padding: 60px 20px;
        }

        .empty-state i {
            font-size: 40px; color: var(--borde-rojo);
            display: block; margin-bottom: 16px;
        }

        .empty-state h3 {
            font-family: 'Cinzel', serif;
            font-size: 18px; color: var(--texto);
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 14px; color: var(--texto-muted);
            margin-bottom: 24px; line-height: 1.7;
        }

        .btn-crear-grande {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 0 28px; height: 46px;
            background: var(--rojo); border: none;
            color: white; font-family: 'Cinzel', serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            cursor: pointer; text-decoration: none;
            transition: background 0.2s;
        }

        .btn-crear-grande:hover { background: var(--rojo-hover); }

        /* Modal confirmación */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200; display: flex;
            align-items: center; justify-content: center;
            padding: 20px; opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .modal {
            background: var(--superficie-2);
            border: 1px solid var(--borde-rojo);
            padding: 32px; max-width: 400px; width: 100%;
            text-align: center;
            transform: translateY(16px);
            transition: transform 0.22s;
        }

        .modal-overlay.open .modal { transform: translateY(0); }

        .modal i { font-size: 32px; color: var(--rojo); margin-bottom: 14px; display: block; }

        .modal h3 {
            font-family: 'Cinzel', serif;
            font-size: 17px; color: var(--texto);
            margin-bottom: 10px;
        }

        .modal p { font-size: 13px; color: var(--texto-muted); line-height: 1.7; margin-bottom: 24px; }

        .modal-acciones { display: flex; gap: 10px; }

        .btn-cancelar {
            flex: 1; padding: 10px;
            background: transparent; border: 1px solid var(--borde);
            color: var(--texto-muted); font-family: 'Raleway', sans-serif;
            font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
            text-transform: uppercase; cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .btn-cancelar:hover { border-color: rgba(255,255,255,0.2); color: var(--texto); }

        .btn-confirmar {
            flex: 1; padding: 10px;
            background: var(--rojo); border: none;
            color: white; font-family: 'Raleway', sans-serif;
            font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; cursor: pointer;
            transition: background 0.15s;
        }

        .btn-confirmar:hover { background: var(--rojo-hover); }

        @media (max-width: 640px) {
            main { padding: 32px 16px 60px; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 16px; }
            .grid-personajes { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <main>

        <div class="page-header">
            <div class="page-header-left">
                <p class="page-eyebrow">Panel del Cazador</p>
                <h1 class="page-titulo">Mis Personajes</h1>
                <p class="page-contador" id="contador-texto">Cargando...</p>
            </div>

    <!-- ═══════════ MODAL ELIMINAR ═══════════ -->
    <div class="modal-overlay" id="modal-eliminar" onclick="cerrarModalFuera(event)">
        <div class="modal">
            <i class="ri-delete-bin-line"></i>
            <h3>¿Eliminar personaje?</h3>
            <p id="modal-texto">Esta acción no se puede deshacer. El personaje y toda su información serán eliminados permanentemente.</p>
            <div class="modal-acciones">
                <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-confirmar" onclick="confirmarEliminar()">Eliminar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth } from "../../../js/firebase-config.js";
import { initBandeja } from "../../../js/bandeja.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { obtenerMisPersonajes, eliminarPersonaje } from "../../../js/personajes.js";

        const LIMITE = 6;
        let idAEliminar = null;

        const ESTADO_CONFIG = {
            sano:    { label: 'Sano',    clase: 'estado-sano',    icono: 'ri-heart-line' },
            herido:  { label: 'Herido',  clase: 'estado-herido',  icono: 'ri-heart-pulse-line' },
            grave:   { label: 'Grave',   clase: 'estado-grave',   icono: 'ri-heart-2-line' },
            critico: { label: 'Crítico', clase: 'estado-critico', icono: 'ri-alarm-warning-line' },
            ko:      { label: 'KO',      clase: 'estado-ko',      icono: 'ri-skull-line' },
        };

        // Esperar auth antes de cargar
        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "../../../login.html"; return; }
            initBandeja(user.uid);
            const nombre = user.displayName || user.email.split('@')[0];
            document.getElementById('nombre-nav').textContent = nombre;
            cargarPersonajes();
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "../../../login.html"; });
        });

        async function cargarPersonajes() {
            const grid = document.getElementById('grid-personajes');
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--texto-muted);">
                <i class="ri-loader-4-line" style="font-size:28px;display:block;margin-bottom:8px;"></i>
                Cargando personajes...
            </div>`;

            try {
                const chars = await obtenerMisPersonajes();
                const total = chars.length;
                const slotsLibres = LIMITE - total;

                document.getElementById('contador-texto').innerHTML =
                    `<span>${total}</span> de <span>${LIMITE}</span> personajes creados`;

                const slotsBar = document.getElementById('slots-bar');
                let slotsHTML = '';
                for (let i = 0; i < LIMITE; i++) {
                    const clase = i < total ? 'ocupado' : (i === total ? 'proximo' : '');
                    slotsHTML += `<div class="slot ${clase}"></div>`;
                }
                let slotsTexto;
                if (slotsLibres <= 0)       slotsTexto = 'Sin slots disponibles';
                else if (slotsLibres === 1)  slotsTexto = '1 slot disponible';
                else                         slotsTexto = slotsLibres + ' slots disponibles';
                slotsHTML += '<span class="slots-label">' + slotsTexto + '</span>';
                slotsBar.innerHTML = slotsHTML;

                const btnCrear = document.getElementById('btn-crear');
                if (total >= LIMITE) {
                    btnCrear.classList.add('disabled');
                    btnCrear.removeAttribute('href');
                    btnCrear.onclick = (e) => { e.preventDefault(); mostrarLimite(); };
                }

                if (total === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="ri-ghost-line"></i>
                            <h3>Aún no hay cazadores</h3>
                            <p>Tu historia en el mundo de Crónicas del Cazador<br>está por comenzar. Crea tu primer personaje.</p>
                            <a href="../../creador/creador.html" class="btn-crear-grande">
                                <i class="ri-user-add-line"></i> Crear mi primer personaje
                            </a>
                        </div>`;
                    return;
                }

                let html = chars.map(c => {
                    const culturaLabel = c.linaje ? `${c.cultura} · ${c.linaje}` : (c.cultura || '—');
                    const estado    = c.estadoSalud || 'sano';
                    const estadoCfg = ESTADO_CONFIG[estado] || ESTADO_CONFIG.sano;
                    const camino    = c.camino || null;
                    const safeNombre = (c.nombre||'').replace(/'/g, "\\'");
                    return `
                    <div class="tarjeta" onclick="irAFicha('${c.id}')">
                        <div class="tarjeta-avatar">
                            ${c.avatar && c.avatar !== 'undefined'
                                ? `<img src="${c.avatar}" alt="${c.nombre}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                                : ''}
                            <i class="ri-user-3-line tarjeta-avatar-placeholder" ${c.avatar && c.avatar !== 'undefined' ? 'style="display:none"' : ''}></i>
                        <div class="tarjeta-nivel">Nv. ${c.nivel || 1}</div>
                    </div>
                        <div class="tarjeta-body">
                            <div class="tarjeta-nombre">${c.nombre || 'Sin nombre'}</div>
                            <div class="tarjeta-cultura">${culturaLabel}</div>
                            <div class="tarjeta-meta">
                                <div class="meta-pill">
                                    <i class="${camino ? 'ri-route-line' : 'ri-lock-line'}"></i>
                                    ${camino || 'Sin camino'}
                                </div>
                                ${c.edad ? `<div class="meta-pill"><i class="ri-user-line"></i>${c.edad} años</div>` : ''}
                            </div>
                            <div class="estado-badge ${estadoCfg.clase}">
                                <i class="${estadoCfg.icono}"></i> ${estadoCfg.label}
                            </div>
                            <div class="tarjeta-acciones" onclick="event.stopPropagation()">
                                <a class="btn-ver" href="ficha.html?id=${c.id}">
                                    <i class="ri-eye-line"></i> Ver Ficha
                                </a>
                                <button class="btn-eliminar" onclick="pedirEliminar('${c.id}', '${safeNombre}')">
                                    <i class="ri-delete-bin-line"></i>
                                </button>
                            </div>
                        </div>
                    </div>`;
                }).join('');

                const vaciosAMostrar = Math.min(slotsLibres, 2);
                for (let i = 0; i < vaciosAMostrar; i++) {
                    html += `<div class="tarjeta-vacia"><i class="ri-add-line"></i><span>Slot disponible</span></div>`;
                }

                grid.innerHTML = html;

            } catch (err) {
                console.error('Error cargando personajes:', err);
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#ff8080;">
                    <i class="ri-error-warning-line" style="font-size:28px;display:block;margin-bottom:8px;"></i>
                    Error al cargar personajes. Revisa la consola.
                </div>`;
            }
        }

        function irAFicha(id) { window.location.href = `ficha.html?id=${id}`; }

        function pedirEliminar(id, nombre) {
            idAEliminar = id;
            document.getElementById('modal-texto').textContent =
                `¿Estás seguro de que quieres eliminar a "${nombre}"? Esta acción no se puede deshacer.`;
            document.getElementById('modal-eliminar').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() {
            idAEliminar = null;
            document.getElementById('modal-eliminar').classList.remove('open');
            document.body.style.overflow = '';
        }

        function cerrarModalFuera(e) {
            if (e.target.id === 'modal-eliminar') cerrarModal();
        }

        async function confirmarEliminar() {
            if (!idAEliminar) return;
            try {
                await eliminarPersonaje(idAEliminar);
                cerrarModal();
                cargarPersonajes();
            } catch (err) {
                console.error(err);
                alert('Error al eliminar. Intenta de nuevo.');
            }
        }

        function mostrarLimite() {
            alert(`Has alcanzado el límite de ${LIMITE} personajes. Elimina uno para poder crear otro.`);
        }

        window.irAFicha          = irAFicha;
        window.pedirEliminar     = pedirEliminar;
        window.cerrarModal       = cerrarModal;
        window.cerrarModalFuera  = cerrarModalFuera;
        window.confirmarEliminar = confirmarEliminar;
    </script>

</body>
</html>
